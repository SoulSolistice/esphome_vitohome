# ============================================================================
# vitohome — full device config for the reference unit (device 0x20CB / VScotHO1)
# ============================================================================

substitutions:
  device_name: viessmann-optolink
  friendly_name: "Viessmann Optolink"
  device_description: "Viessmann Optolink Heating Control"
  ## Project name MUST be "namespace.project" (dot-separated) or validation fails.
  project_name:       "viessmann-optolink.VScotHO1_72"
  debug_level:        "DEBUG"
  ## --- Firmware source -------------------------------------------------------
  ## Upgrade the whole firmware by bumping vitohome_ref to a new git tag.
  ## This one value drives BOTH the packages include and the C++ component,
  ## so there is nothing else to edit or merge on update.
  vitohome_repo:    "https://github.com/SoulSolistice/esphome_vitohome"
  vitohome_ref:     "main"      # pin to a tag (e.g. "v0.1") for reproducible builds

esphome:
  name:           ${device_name}
  friendly_name:  ${friendly_name}
  comment:        ${device_description}
  min_version:    2025.12.0
  project:
    name: ${project_name}
    ## Version follows the deployed firmware ref: one source of truth. Because
    ## project.version reads vitohome_ref (the git tag/branch the packages and
    ## C++ component were pulled from), the reported version tracks that ref.
    ## With a pinned tag (e.g. "v0.1") the version uniquely identifies the build.
    ## With ref "main" the version string is just "main", so two builds taken at
    ## different times both report "main" despite differing — pin a tag for a
    ## reproducible, uniquely identifiable build.
    ## (project.version is a free string; a tag like "v0.1" or "main" both fit.)
    version: ${vitohome_ref}

esp32:
  variant: esp32c3
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

external_components:
  - source:
      type: git
      url: ${vitohome_repo}
      ref: ${vitohome_ref}
    components: [vitohome]
    refresh: 0s        # re-pull main on every build

time:
  - platform: homeassistant
    id: homeassistant_time

api:
  encryption:
    key: !secret esphome-api

ota:
  - platform: esphome
    password: !secret esphome-ota

ethernet:
  type: DM9051
  clk_pin: GPIO07
  mosi_pin: GPIO10
  miso_pin: GPIO03
  cs_pin: GPIO09
  interrupt_pin: GPIO08
  reset_pin: GPIO06
  clock_speed: 8MHz
  #use_address: viessmann-optolink-test

safe_mode:
  boot_is_good_after: 60s
  num_attempts: 10
  reboot_timeout: 5min

logger:
  level: ${debug_level}
  logs:
    vitohome: ${debug_level}
    vitohome.sensor: ${debug_level}
    vitohome.number: ${debug_level}
    vitohome.select: ${debug_level}
    vitohome.text_sensor: ${debug_level}

button:
  - platform: restart
    name: "Restart"
    entity_category: diagnostic
  - platform: safe_mode
    name: "Safe Mode"
    entity_category: diagnostic

# 4800 8E2 is MANDATORY: vitohome hard-fails in validate_uart_() on any
# mismatch of baud / data-bits / stop-bits / parity.
uart:
  - id: uart_optolink
    rx_pin: GPIO05
    tx_pin: GPIO02
    baud_rate: 4800
    data_bits: 8
    parity: EVEN
    stop_bits: 2
    debug:
      direction: BOTH
      dummy_receiver: false
      after:
        delimiter: [0x06]
      sequence:
        - lambda: UARTDebug::log_hex(direction, bytes, ':');

# --- vitohome hub -----------------------------------------------------------
# update_interval is the base poll tick; per-entity `update_interval` below
# slows individual datapoints to a multiple of this tick. identify_device reads
# 0xF8..0xFB once at boot and logs the device tuple.
vitohome:
  id: vito
  uart_id: uart_optolink
  protocol: KW
  update_interval: 60s
  identify_device: true

## ============================================================
## Firmware logic — pulled from GitHub at ${vitohome_ref}.
## `refresh` controls how often ESPHome re-checks the ref for a moved
## branch; irrelevant when ref is a fixed tag. Files merge with the blocks
## in this entry file (substitutions here override package defaults).
##
## `packages:` is given as a LIST. ESPHome also accepts a name->package
## mapping; both forms are supported. The list form is used here because the
## entry is a single remote git package and needs no reference key.
## ============================================================
packages:
  - url: ${vitohome_repo}
    ref: ${vitohome_ref}
    refresh: 0s
    files:
      - example/vscotho1_72.dp.curated.yaml
