# --- datapoints needing custom decode (not auto-emitted) ---
# WPR WO1H RaumTemp NatCooling SensorStatus @ 0x01DA: BitPosition 4 implies byte 0 but the export declares BytePosition 2 -- contradictory, needs hardware confirmation before it can be emitted
# WPR vmarSchaltzeitenGroup 1 0 @ 0x9000: NoConversion length 24 > 4 bytes -> custom decode
# WPR Tagesprogramm HK1 @ 0x9000: NoConversion length 168 > 4 bytes -> custom decode
# WPR Tagesprogramm HK2 @ 0x9007: NoConversion length 168 > 4 bytes -> custom decode
# WPR Tagesprogramm HK3 @ 0x900E: NoConversion length 168 > 4 bytes -> custom decode
# WPR Tagesprogramm PSP @ 0x9015: NoConversion length 168 > 4 bytes -> custom decode
# WPR Tagesprogramm WW @ 0x901C: NoConversion length 168 > 4 bytes -> custom decode
# NKU Tagesprogramm HK1 @ 0x9200: NoConversion length 168 > 4 bytes -> custom decode
# NKU Tagesprogramm HK2 @ 0x9238: NoConversion length 168 > 4 bytes -> custom decode
# NKU Tagesprogramm HK3 @ 0x9270: NoConversion length 168 > 4 bytes -> custom decode
# NKU Tagesprogramm PSP @ 0x92A8: NoConversion length 168 > 4 bytes -> custom decode
# NKU Tagesprogramm WW @ 0x92E0: NoConversion length 168 > 4 bytes -> custom decode
# NKU Tagesprogramm ZP @ 0x9318: NoConversion length 168 > 4 bytes -> custom decode
