number:
  # --- Versionen ---
  - platform: vitohome
    name: "vcLanAnlagennummer"
    id: vcLanAnlagennummer
    address: 0x7776
    length: 1
    converter: noconv
    # Borders absent, or out of range for this byte width, in
    # the export. These placeholders pass `esphome config` but
    # pin the value to 0 - set real min/max/step before use.
    min_value: 0
    max_value: 0
    step: 1
    mode: box
    disabled_by_default: true
    update_interval: 3600s
  - platform: vitohome
    name: "vcLanTeilnehmernummer"
    id: vcLanTeilnehmernummer
    address: 0x7777
    length: 1
    converter: noconv
    # Borders absent, or out of range for this byte width, in
    # the export. These placeholders pass `esphome config` but
    # pin the value to 0 - set real min/max/step before use.
    min_value: 0
    max_value: 0
    step: 1
    mode: box
    disabled_by_default: true
    update_interval: 3600s

text_sensor:
  - platform: vitohome
    type: device_id
    name: "Geraete-Typ"
    id: device_type
    icon: "mdi:identifier"
    entity_category: diagnostic
  # --- Versionen ---
  - platform: vitohome
    type: enum
    name: "vcLanModemTyp"
    id: vcLanModemTyp
    address: 0xAE00
    length: 1
    disabled_by_default: true
    update_interval: 60s
    options:
      0x00: "Kein"
      0x01: "ISDN"
      0x02: "Analog"
      0x03: "GSM"
      0x04: "GPRS"
