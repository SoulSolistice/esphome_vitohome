    address: 0x772E
    length: 1
    disabled_by_default: true
    update_interval: 3600s
    options:
      0x00: "0 Regelfunktion"
      0x01: "K2E_NRx_KonfiKennungFunkATS~1"
      0x02: "K2E_NRx_KonfiKennungFunkATS~2"
  # --- Diagnose 2 / Kommunikation ---
  - platform: vitohome
    name: "K01 KonfiAnlagentyp D"
    id: K01_KonfiAnlagentyp_D
    address: 0x7701
    length: 1
    disabled_by_default: true
    update_interval: 3600s
    options:
      0x01: "Einkessel"
      0x02: "Mehrkessel-LON"
      0x03: "Kontaktsteuerung"
  # --- Diagnose 2 / Relaistest ---
  - platform: vitohome
    name: "Relaistest NR2011 V100GC1A"
    id: Relaistest_NR2011_V100GC1A
    address: 0x7500
    length: 1
    disabled_by_default: true
    update_interval: 3600s
    options:
      0x00: "Inaktiv"
      0x42: "Brenner"
      0x82: "Ausgang 20"
      0xC2: "Brenner 1.Stufe"
      0x83: "Ausgang 29"
      0xC3: "Brenner 2.Stufe"
      0x45: "Mod. Brenner AUF"
      0x46: "Mod. Brenner NEUTRAL"
      0x47: "Mod. Brenner Zu"
      0x4E: "Sammelstörung"
      0x01: "Alle Aus"
  # --- Diagnose 2 / Ausgaenge ---
