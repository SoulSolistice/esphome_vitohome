select:
  # --- BedienungA1 / Betriebsdaten ---
  # Writable operating-mode (Betriebsart). KNOWN ISSUES on real 0x20CB /
  # VScotHO1 units (see project notes / hardware audit):
  #  * openv/community drives the mode at 0x2301 with 6 options
  #    (Warmwasser/Reduziert/Normal/Heizen+WW/Heizen+WW FS/Abschaltbetrieb);
  #    Vitosoft lists this variant's write here with fewer options.
  #  * Writes may be ACKed yet not take effect: a Bedienteil program-switch
  #    interlock, a read/write address split, or a firmware-accepted value
  #    subset narrower than the enum. Verify with `debug:` under uart:.
  #  * The 'aktuelle Betriebsart' READ (a bit-field in the 0x2500 block)
  #    does NOT decode correctly and is intentionally not emitted.
  - platform: vitohome
    name: "BedienteilBA GWGA1 Konstant"
    id: BedienteilBA_GWGA1_Konstant
    address: 0x2323
    length: 1
    disabled_by_default: true
    update_interval: 3600s
    options:
      0x00: "Abschalt"
      0x01: "Nur WW"
      0x02: "Heizen + WW"
  # --- Diagnose 1 / Kessel ---
  - platform: vitohome
    name: "SR13 K0C KonfiDKRLFunktion"
    id: SR13_K0C_KonfiDKRLFunktion
    address: 0x580C
    length: 1
    disabled_by_default: true
    update_interval: 3600s
    options:
      0x00: "0 ohne Funktion"
      0x01: "1 RL-Regelung"
      0x02: "2 DK zeitgesteuert"
      0x03: "3 DK schaltend"
      0x04: "4 DK stetig KT"
      0x05: "5 DK stetig"
      0x06: "K0C_KonfiDKRLFunktionV100GC1~6"
  # --- Diagnose 1 / Wartung ---
  - platform: vitohome
    name: "SR13 K24 KonfiStatusWartung"
    id: SR13_K24_KonfiStatusWartung
    address: 0x5824
    length: 1
    disabled_by_default: true
    update_interval: 3600s
    options:
      0x00: "0 Grundzustand"
      0x01: "1 Wartung"
  # --- Diagnose 1 / Erweiterung AM1 ---
  - platform: vitohome
    name: "K32 GWG Kennung AM1"
    id: K32_GWG_Kennung_AM1
    address: 0x7732
    length: 1
    disabled_by_default: true
    update_interval: 3600s
    options:
      0x00: "ohne Anschlußerweiterung AM1"
      0x01: "mit Anschlußmodul AM1"
  # --- Diagnose 2 / Regelung ---
  - platform: vitohome
    name: "K2E NRx KonfiKennungFunkATS"
