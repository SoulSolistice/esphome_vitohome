# pinned to 0 until you fill in the real bounds.
# ============================================================

sensor:
  # --- Konfiguration / Datenbankversion ---
  - platform: vitohome
    name: "Vitogate Entwicklerversion"
    id: Vitogate_Entwicklerversion
    address: 0x0100
    length: 2
    byte_offset: 1
    converter: noconv
    state_class: measurement
    disabled_by_default: true
    update_interval: 60s

binary_sensor:
  # --- Konfiguration / Datenbankversion ---
  - platform: vitohome
    name: "Vitogate Hauptversion"
    id: Vitogate_Hauptversion
    address: 0x0100
    length: 2
    bit_mask: 0x80
    disabled_by_default: true
    update_interval: 60s
  - platform: vitohome
    name: "Vitogate Nebenversion"
    id: Vitogate_Nebenversion
    address: 0x0100
    length: 2
    bit_mask: 0x08
    disabled_by_default: true
    update_interval: 60s

number:
  # --- Konfiguration / Anlagennummer ---
  - platform: vitohome
    name: "vitogateAnlagennummer"
    id: vitogateAnlagennummer
    address: 0x7776
    length: 1
    converter: noconv
    min_value: 1
    max_value: 5
    step: 1
    mode: box
    disabled_by_default: true
    update_interval: 3600s
  # --- Konfiguration / Teilnehmernummer ---
  - platform: vitohome
    name: "vitogateTeilnehmernummer"
    id: vitogateTeilnehmernummer
    address: 0x7777
    length: 1
    converter: noconv
    min_value: 1
    max_value: 99
    step: 1
    mode: box
    disabled_by_default: true
    update_interval: 3600s

text_sensor:
  - platform: vitohome
    type: device_id
    name: "Geraete-Typ"
    id: device_type
    icon: "mdi:identifier"
    entity_category: diagnostic
