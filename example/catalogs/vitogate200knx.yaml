# vitohome package generated for device: Vitogate200KNX
# profile: standard   entities: 6
#
# Generated by scripts/gen_catalog.py from a Vitosoft XML export.
# Define the `vitohome:` hub and `uart:` in your device YAML and
# include this file via `packages:`. All entities are
# disabled_by_default; enable the ones you want in Home Assistant.
#
# FCRead filter ON: 0 datapoint(s) requiring a non-Optolink
# access method (GFA_READ/RPC/PROZESS/KBUS/OT) were omitted as unreachable
# via VitoWiFi's read. Re-run with --no-reachable-only to include them.
#
# VERIFY ON HARDWARE: not every address answers on every firmware.
# Run `esphome config` then `esphome compile`/`run` before relying
# on any value. number entities whose borders were absent in the
