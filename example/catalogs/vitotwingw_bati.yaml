  # --- VitotwinGW BATI ---
  # System fault history slot 1 of 10 (ecnsysEventType~VitotwinErrorHistory,
  # 120-byte block at 0x7000 + 0*12; vcontrold getError0).
  # Slot 1 = newest entry -- hardware-confirmed on VScotHO1_72.
  # If the device NAKs the 9-byte block read, drop length to 1 (code only).
  - platform: vitohome
    type: error_history
    name: "Letzter Fehler (Vitotwin)"
    id: letzter_fehler_vitotwin
    address: 0x7000
    length: 9
    icon: "mdi:alert-circle"
    entity_category: diagnostic
    update_interval: 300s
    # Fault-code map ('vd300' set) - DEFAULT, verify for this unit (see fault_codes.CONFLICTS):
    codes:
      0x00: "Regelbetrieb (kein Fehler)"
      0x10: "Kurzschluss Außentemperatursensor"
      0x18: "Unterbrechung Außentemperatursensor"
      0x19: "Unterbrechung Kommunikation Außentemperatursensor RF"
      0x1D: "Keine Kommunikation mit Sensor"
      0x1E: "Strömungssensor defekt"
      0x1F: "Strömungssensor defekt"
      0x20: "Kurzschluss Vorlauftemperatursensor Anlage"
      0x28: "Unterbrechung Vorlauftemperatursensor Anlage"
