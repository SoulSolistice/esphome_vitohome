  # --- LON Objekte / CFDMObjekt ---
  - platform: vitohome
    name: "nviApplicMode CFDM"
    id: nviApplicMode_CFDM
    address: 0xA382
    length: 1
    disabled_by_default: true
    update_interval: 3600s
    options:
      0x00: "HVAC_AUTO"
      0x01: "HVAC_HEAT"
      0x02: "HVAC_MRNG_WRMUP"
      0x03: "HVAC_COOL"
      0x04: "HVAC_NIGHT_PURGE"
      0x05: "HVAC_PRE_COOL"
      0x06: "HVAC_OFF"
      0x07: "HVAC_TEST"
      0x08: "HVAC_EMERG_HEAT"
      0x09: "HVAC_FAN_ONLY"
      0x0A: "HVAC_FREE_COOL"
      0x0B: "HVAC_ICE"
      0x6E: "HVAC_SLAVE_ACTIVE"
      0x6F: "HVAC_LOW_FIRE"
      0x70: "HVAC_HIGH_FIRE"
      0x64: "HVAC_FLOW_TEMP"
      0xFF: "HVAC_NUL"
  - platform: vitohome
    name: "nviProdCmd CFDM state"
    id: nviProdCmd_CFDM_state
    address: 0xA381  # write target: the field's own register (interior write; verify on hardware)
    state_address: 0xA380  # aligned block read at the base (P300-safe)
    length: 2
    byte_offset: 1
    disabled_by_default: true
    update_interval: 3600s
    options:
      0x00: "AUS"
      0x01: "EIN"
      0xFF: "AUTO"
