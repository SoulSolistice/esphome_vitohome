select:
  # --- Codierung 1 / Kommunikation LON ---
  - platform: vitohome
    name: "WPR LONObjekte AussenTemp"
    id: WPR_LONObjekte_AussenTemp
    address: 0x7797
    length: 1
    disabled_by_default: true
    update_interval: 3600s
    options:
      0x00: "0: lokal"
      0x01: "1: vom Feldbus (z.B. LON) empfangen"
      0x02: "2: auf Feldbus (z.B. LON) senden"
  - platform: vitohome
    name: "WPR LONObjekte Feldbus Uhrzeit"
    id: WPR_LONObjekte_Feldbus_Uhrzeit
    address: 0x77FF
    length: 1
    disabled_by_default: true
    update_interval: 3600s
    options:
      0x00: "0: lokal"
      0x01: "1: vom Feldbus (z.B. LON) empfangen"
      0x02: "2: auf Feldbus (z.B. LON) senden"
  # --- ProgrammingCooling / Kuehlung ---
  - platform: vitohome
    name: "WPR SepNCKreis NatCooling Kreis"
    id: WPR_SepNCKreis_NatCooling_Kreis
    address: 0x7100
    length: 1
    disabled_by_default: true
    update_interval: 3600s
    options:
      0x00: "Keine Kühlung"
      0x01: "Natural Cooling"
      0x02: "NC mit Mischer"
      0x03: "Active Cooling"
  - platform: vitohome
    name: "WPR SepNCKreis NatCooling RaumTempSens Rangierung"
    id: WPR_SepNCKreis_NatCooling_RaumTempSens_Rangierung
    address: 0x7106
    length: 1
    disabled_by_default: true
    update_interval: 3600s
    options:
      0x00: "0: Verwendung des NC-Raumsensors"
      0x01: "1: Verwendung des HK1-Raumsensors"
      0x02: "2: Verwendung des HK2-Raumsensors"
      0x03: "3: Verwendung des HK3-Raumsensors"
  - platform: vitohome
    name: "WPR SepNCKreis NatCooling Kuehlkreis"
    id: WPR_SepNCKreis_NatCooling_Kuehlkreis
    address: 0x7101
    length: 1
    disabled_by_default: true
    update_interval: 3600s
    options:
      0x01: "Kühlen auf HK1"
      0x02: "Kühlen auf HK2"
      0x03: "Kühlen auf HK3"
      0x04: "Kühlen auf separaten Kühlkreis"
  # --- ProgrammingHC / HK1allgemein ---
  # Writable operating-mode (Betriebsart). KNOWN ISSUES on real 0x20CB /
  # VScotHO1 units (see project notes / hardware audit):
  #  * openv/community drives the mode at 0x2301 with 6 options
  #    (Warmwasser/Reduziert/Normal/Heizen+WW/Heizen+WW FS/Abschaltbetrieb);
  #    Vitosoft lists this variant's write here with fewer options.
  #  * Writes may be ACKed yet not take effect: a Bedienteil program-switch
  #    interlock, a read/write address split, or a firmware-accepted value
  #    subset narrower than the enum. Verify with `debug:` under uart:.
  #  * The 'aktuelle Betriebsart' READ (a bit-field in the 0x2500 block)
  #    does NOT decode correctly and is intentionally not emitted.
  - platform: vitohome
    name: "WPR HK1 Betriebsart Heizkreis"
    id: WPR_HK1_Betriebsart_Heizkreis
    address: 0x2004
    length: 1
    disabled_by_default: true
    update_interval: 3600s
    options:
      0x00: "0: Stand-by: Frostschutz"
      0x01: "1: Dauernd reduzierte Raumtemp."
      0x02: "2: Dauernd normale Raumtemp."
      0x03: "3: Festwertregler auf max. Vorlauftemp."
      0x04: "4: Schaltzeiten"
      0x05: "5: Betriebsartenwahlschalter"
      0x06: "6: Standard"
  - platform: vitohome
    name: "WPR HK1 Raumtemperaturaufschaltung"
    id: WPR_HK1_Raumtemperaturaufschaltung
    address: 0x200B
    length: 1
    disabled_by_default: true
    update_interval: 3600s
    options:
      0x00: "0: ohne"
      0x01: "1: Reduzierter Betrieb"
      0x02: "2: Normaler Betrieb"
      0x03: "3: Normaler & Reduzierter Betrieb"
  - platform: vitohome
    name: "WPR HK1 WTimer HK"
    id: WPR_HK1_WTimer_HK
    address: 0x2002
    length: 2
