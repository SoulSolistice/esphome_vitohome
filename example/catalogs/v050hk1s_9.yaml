select:
  # --- BedienungM1 / Betriebsdaten ---
  # Writable operating-mode (Betriebsart). KNOWN ISSUES on real 0x20CB /
  # VScotHO1 units (see project notes / hardware audit):
  #  * openv/community drives the mode at 0x2301 with 6 options
  #    (Warmwasser/Reduziert/Normal/Heizen+WW/Heizen+WW FS/Abschaltbetrieb);
  #    Vitosoft lists this variant's write here with fewer options.
  #  * Writes may be ACKed yet not take effect: a Bedienteil program-switch
  #    interlock, a read/write address split, or a firmware-accepted value
  #    subset narrower than the enum. Verify with `debug:` under uart:.
  #  * The 'aktuelle Betriebsart' READ (a bit-field in the 0x2500 block)
  #    does NOT decode correctly and is intentionally not emitted.
  - platform: vitohome
    name: "BedienteilBetriebsartA1M1"
    id: BedienteilBetriebsartA1M1
    address: 0x2320
    length: 1
    disabled_by_default: true
    update_interval: 3600s
    options:
      0x00: "Abschalt"
      0x01: "Nur WW"
      0x02: "Heizen + WW"
  # --- Diagnose 1 / HeizkreisM1 ---
  - platform: vitohome
    name: "KC7 OptmierteMischerA1M1"
    id: KC7_OptmierteMischerA1M1
    address: 0x27C7
    length: 1
    disabled_by_default: true
    update_interval: 3600s
    options:
      0x00: "inaktiv"
      0x01: "aktiv"
      0x02: "aktiv (0x02)"
      0x03: "aktiv (0x03)"
      0x04: "aktiv (0x04)"
      0x05: "aktiv (0x05)"
      0x06: "aktiv (0x06)"
      0x07: "aktiv (0x07)"
      0x08: "aktiv (0x08)"
      0x09: "aktiv (0x09)"
      0x0A: "aktiv (0x0A)"
      0x0B: "aktiv (0x0B)"
      0x0C: "aktiv (0x0C)"
      0x0D: "aktiv (0x0D)"
      0x0E: "aktiv (0x0E)"
      0x0F: "aktiv (0x0F)"
      0x10: "aktiv (0x10)"
      0x11: "aktiv (0x11)"
      0x12: "aktiv (0x12)"
      0x13: "aktiv (0x13)"
      0x14: "aktiv (0x14)"
      0x15: "aktiv (0x15)"
      0x16: "aktiv (0x16)"
      0x17: "aktiv (0x17)"
      0x18: "aktiv (0x18)"
      0x19: "aktiv (0x19)"
      0x1A: "aktiv (0x1A)"
      0x1B: "aktiv (0x1B)"
      0x1C: "aktiv (0x1C)"
      0x1D: "aktiv (0x1D)"
      0x1E: "aktiv (0x1E)"
      0x1F: "aktiv (0x1F)"
  # --- Diagnose 2 / Kommunikation ---
  - platform: vitohome
    name: "K97 Konfi Aussentemperatur"
    id: K97_Konfi_Aussentemperatur
    address: 0x7797
    length: 1
    disabled_by_default: true
    update_interval: 3600s
    options:
      0x00: "vom Sensor"
      0x01: "vom LON uebernehmen"
