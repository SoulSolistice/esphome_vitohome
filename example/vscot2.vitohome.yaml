# ============================================================
# vitohome - VScotHO1_72 "simple setup" package
#
# A curated, value-adding monitoring set for a basic system:
#   * one heating circuit on A1 (direct/un-mixed) with its pump
#   * domestic hot water (DHW / Warmwasser)
# Covers temperatures, flue gas (Abgas), burner stats, modulation,
# flow rate, pump states, faults and device identity - i.e. what you
# need to see that the boiler is working correctly.
#
# Every datapoint here is Optolink-reachable (FCRead = Virtual_READ) and
# uses the field-accurate address/length/converter from gen_catalog.py.
# Entities are ENABLED by default so monitoring works out of the box.
#
# USAGE - define the hub + UART once in your device YAML, then include
# this file. For the ESP32-C3 Optolink build that is e.g.:
#
#   uart:
#     id: optolink_uart
#     tx_pin: GPIO5
#     rx_pin: GPIO2
#     baud_rate: 4800
#     data_bits: 8
#     parity: EVEN
#     stop_bits: 2
#   vitohome:
#     uart_id: optolink_uart
#     protocol: P300
#   packages:
#     vscot2: !include vscot2.vitohome.yaml
#
# VERIFY ON HARDWARE: addresses come from the Vitosoft catalog for this
# variant; confirm with `esphome config` then `esphome run` before relying
# on a value. Sub-zero temperatures exercise the signed div10 path.
# ============================================================

sensor:
  # --- Temperatures -------------------------------------------------------
  - platform: vitohome
    name: "Outside Temperature"
    id: outside_temperature
    address: 0x5525            # ATS, low-pass filtered
    length: 2
    converter: div10
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    icon: "mdi:thermometer"
    update_interval: 60s

  - platform: vitohome
    name: "Boiler Temperature"
    id: boiler_temperature
    address: 0x0810            # KTS, boiler water (low-pass; vcontrold uses raw 0x0802)
    length: 2
    converter: div10
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    icon: "mdi:water-boiler"
    update_interval: 60s

  - platform: vitohome
    name: "Flue Gas Temperature"
    id: flue_gas_temperature
    address: 0x0816            # AGTS, Abgas (low-pass; vcontrold uses raw 0x0808 for 0x20CB)
    length: 2
    converter: div10
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    icon: "mdi:smoke"
    update_interval: 60s

  - platform: vitohome
    name: "Flow Temperature HC1 (A1)"
    id: flow_temperature_hc1
    address: 0x2900            # Vorlauftemperatur M1/A1
    length: 2
    converter: div10
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    icon: "mdi:thermometer-chevron-up"
    update_interval: 60s

  - platform: vitohome
    name: "Flow Setpoint HC1 (A1)"
    id: flow_setpoint_hc1
    address: 0x2544            # VT Solltemperatur A1M1 (demanded flow)
    length: 2
    converter: div10
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    icon: "mdi:thermometer-lines"
    update_interval: 60s

  - platform: vitohome
    name: "DHW Temperature"
    id: dhw_temperature
    address: 0x0812            # WW1 / Speicher (top)
    length: 2
    converter: div10
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    icon: "mdi:water-thermometer"
    update_interval: 60s

  - platform: vitohome
    name: "DHW Setpoint"
    id: dhw_setpoint
    address: 0x6500            # WW Solltemperatur aktuell (read-back)
    length: 2
    converter: div10
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    icon: "mdi:thermometer-water"
    update_interval: 60s

  - platform: vitohome
    name: "Boiler Setpoint"
    id: boiler_setpoint
    address: 0x555A            # Kesselsoll eff
    length: 2
    converter: div10
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    icon: "mdi:thermometer-lines"
    update_interval: 60s

  # --- Burner -------------------------------------------------------------
  - platform: vitohome
    name: "Burner Modulation"
    id: burner_modulation
    address: 0xA305            # nvoBoilerState value (low byte, x0.5)
    length: 1
    converter: div2
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 1
    icon: "mdi:fire"
    update_interval: 30s

  - platform: vitohome
    name: "Burner Hours"
    id: burner_hours
    address: 0x0886            # Betriebsstunden Brenner 1
    length: 4
    converter: sec2hour
    unit_of_measurement: "h"
    device_class: duration
    state_class: total_increasing
    accuracy_decimals: 1
    icon: "mdi:timer"
    update_interval: 600s
    # vcontrold reads burner hours at 0x08A7 (BetriebsstundenBrennerBedienung)
    # for 0x20CB; this uses 0x0886 (BetriebsstundenBrenner1). Both are sec2hour.
    # If this reads 0 or looks wrong on hardware, compare against 0x08A7.

  - platform: vitohome
    name: "Burner Starts"
    id: burner_starts
    address: 0x088A            # Brennerstarts (read-only here)
    length: 4
    converter: noconv
    state_class: total_increasing
    icon: "mdi:counter"
    update_interval: 3600s

  # --- Flow rate ----------------------------------------------------------
  - platform: vitohome
    name: "Flow Rate"
    id: flow_rate
    address: 0x0C24            # Durchfluss STRS1; raw l/h (see note below)
    length: 2
    converter: noconv
    unit_of_measurement: "L/h"
    state_class: measurement
    icon: "mdi:water-percent"
    update_interval: 60s
    # NOTE: a scaling factor exists at 0x0C26 (Skalierung Durchfluss). If the
    # raw value looks off by a constant factor, divide by that on the HA side.

  # ======================================================================
  # BETRIEBSART (operating-mode) WRITE DEBUG  --  hardware test harness
  # ----------------------------------------------------------------------
  # Goal: find why setting the mode does not "take". Use together with the
  # writable "Operating Mode (set) [A1]" select in the select: section below.
  # The writable mode for this variant is 0x2323 (BedienteilBA, Virtual_WRITE,
  # 5 values); the read-only current mode lives in the 0x2500 block (byte 1 =
  # 0x2501). openv/vcontrold instead drive the mode at 0x2301 (6 values) -- a
  # read/write address split is one of the prime suspects.
  #
  # Test procedure:
  #   1. Note "BA raw @0x2323" and "BA raw @0x2301" and "BA effective".
  #   2. Change the select to a new value (it writes 0x2323).
  #   3. If "BA raw @0x2323" changes to your value -> the write reached 0x2323.
  #      If it does NOT change -> the write is rejected at 0x2323 (try 0x2301).
  #   4. If "BA effective" ALSO changes -> the mode took. If 0x2323 changed but
  #      effective did not -> a Bedienteil program-switch interlock is overriding.
  #   5. If "Economy/Party/Holiday active" is ON, a special mode can lock the
  #      base Betriebsart -- clear it first.
  # Raw bytes are shown (not enum labels) so an out-of-range value (e.g. 0x05,
  # the value seen earlier) is visible instead of decoding to blank.
  # ======================================================================
  - platform: vitohome
    name: "BA raw @0x2323 (debug)"
    id: ba_raw_2323
    address: 0x2323            # the Virtual_WRITE target; read its raw byte back
    length: 1
    converter: noconv
    entity_category: diagnostic
    icon: "mdi:bug"
    update_interval: 30s
  - platform: vitohome
    name: "BA raw @0x2301 (debug)"
    id: ba_raw_2301
    address: 0x2301            # vcontrold operating-mode address (unit "BA") = the
    length: 1                  # ACTUAL mode; reads OK on this unit (not a NAK). BA
    converter: noconv          # enum: 0=WW 1=RED 2=NORM 3=H+WW 4=H+WW_FS 5=ABSCHALT
    entity_category: diagnostic
    icon: "mdi:bug"
    update_interval: 30s
  - platform: vitohome
    name: "BA effective (debug)"
    id: ba_effective
    address: 0x2501            # byte 1 of the 0x2500 block = running mode; verify
    length: 1
    converter: noconv
    entity_category: diagnostic
    icon: "mdi:bug"
    update_interval: 30s
  # Economy (0x2302) and Party (0x2303) state are now exposed by the writable
  # two-address selects in the select: section (they read the state address and
  # write the command address), so their standalone debug sensors were removed.
  - platform: vitohome
    name: "Holiday active A1 (debug)"
    id: ba_holiday_active
    address: 0x2535            # HK FerienbetriebA1M1 (0/1)
    length: 1
    converter: noconv
    entity_category: diagnostic
    icon: "mdi:bug"
    update_interval: 30s

binary_sensor:
  - platform: vitohome
    name: "Flame"
    id: flame
    address: 0x55DD            # GWG Flamme1 (bit 2)
    length: 1
    bit_mask: 0x04
    device_class: running
    icon: "mdi:fire"
    update_interval: 30s

text_sensor:
  - platform: vitohome
    type: device_id
    name: "Device Type"
    id: device_type
    icon: "mdi:identifier"
    entity_category: diagnostic

  - platform: vitohome
    type: enum
    name: "Heating Pump HC1 (A1)"
    id: heating_pump_hc1
    address: 0x2906            # HK Pumpenzustand A1M1
    length: 1
    icon: "mdi:pump"
    update_interval: 60s
    options:
      0x00: "Off"
      0x01: "On"

  - platform: vitohome
    type: enum
    name: "DHW Charge Pump"
    id: dhw_charge_pump
    address: 0x6513            # Speicherladepumpe
    length: 1
    icon: "mdi:pump"
    update_interval: 60s
    options:
      0x00: "Off"
      0x01: "On"

  # Most-recent fault from the error archive. Full block is 90 bytes
  # (10 slots x 9) at this address; this reads the most-recent slot only.
  # If the device NAKs the 9-byte block read, drop length to 1 (code only).
  - platform: vitohome
    type: error_history
    name: "Last Fault"
    id: last_fault
    address: 0x7507
    length: 9
    icon: "mdi:alert-circle"
    update_interval: 300s
    # openv/community code map (DEFAULT - verify for this unit):
    codes:
      0x00: "Regelbetrieb (kein Fehler)"
      0x0F: "Wartung (fuer Reset Codieradresse 24 auf 0 stellen)"
      0x10: "Kurzschluss Aussentemperatursensor"
      0x18: "Unterbrechung Aussentemperatursensor"
      0x19: "Unterbrechung Kommunikation Aussentemperatursensor (Funk)"
      0x20: "Kurzschluss Vorlauftemperatursensor"
      0x21: "Kurzschluss Ruecklauftemperatursensor"
      0x28: "Unterbrechung Vorlauftemperatursensor"
      0x29: "Unterbrechung Ruecklauftemperatursensor"
      0x30: "Kurzschluss Kesseltemperatursensor"
      0x38: "Unterbrechung Kesseltemperatursensor"
      0x40: "Kurzschluss Vorlauftemperatursensor M2"
      0x42: "Unterbrechung Vorlauftemperatursensor M2"
      0x50: "Kurzschluss Speichertemperatursensor"
      0x58: "Unterbrechung Speichertemperatursensor"
      0x92: "Solar: Kurzschluss Kollektortemperatursensor"
      0x93: "Solar: Kurzschluss Sensor S3"
      0x94: "Solar: Kurzschluss Speichertemperatursensor"
      0x9A: "Solar: Unterbrechung Kollektortemperatursensor"
      0x9B: "Solar: Unterbrechung Sensor S3"
      0x9C: "Solar: Unterbrechung Speichertemperatursensor"
      0x9E: "Solar: Zu geringer Ertrag / Durchfluss"
      0xB0: "Kurzschluss Abgastemperatursensor"
      0xB1: "Unterbrechung Abgastemperatursensor"
      0xBA: "Kommunikationsfehler Erweiterung Mischerkreis M2"
      0xBC: "Kommunikationsfehler Fernbedienung Vitotrol A1"
      0xBD: "Kommunikationsfehler Fernbedienung Vitotrol M2"
      0xBE: "Falsche Codierung Fernbedienung"
      0xC2: "Kommunikationsfehler Erweiterung extern (LON)"
      0xC5: "Kommunikationsfehler drehzahlgeregelte Pumpe"
      0xCD: "Kommunikationsfehler Vitocom"
      0xD1: "Brennerstoerung"
      0xDA: "Kurzschluss Raumtemperatursensor A1"
      0xDB: "Kurzschluss Raumtemperatursensor M2"
      0xE5: "Interner Fehler (Flammenverstaerker)"
      0xF0: "Interner Fehler (Regelung tauschen)"
      0xF1: "Abgastemperaturbegrenzer ausgeloest"
      0xF2: "Uebertemperatur"
      0xF4: "Flammensignal fehlt / Brenner stoert"
      0xFD: "Fehler Brennersteuergeraet / Codierung"
      0xFF: "Kommunikationsfehler Brennersteuergeraet"

  # Device identity (ASCII byte-strings, HexByte2AsciiByte) -- read-only,
  # diagnostic. Surfaced by the vcontrold cross-check as worthwhile reads.
  - platform: vitohome
    type: ascii
    name: "Part Number (Sachnummer)"
    id: sachnummer
    address: 0x08E0
    length: 7
    entity_category: diagnostic
    icon: "mdi:identifier"
  - platform: vitohome
    type: ascii
    name: "Control Serial (Herstellnr Regelung)"
    id: herstellnr_regelung
    address: 0xF000
    length: 16
    entity_category: diagnostic
    icon: "mdi:identifier"
  - platform: vitohome
    type: ascii
    name: "Boiler Serial (Herstellnr Kessel)"
    id: herstellnr_kessel
    address: 0xF010
    length: 16
    entity_category: diagnostic
    icon: "mdi:identifier"

number:
  # Optional control: set the DHW target temperature. Remove this section
  # if you only want monitoring.
  - platform: vitohome
    name: "DHW Setpoint Control"
    id: dhw_setpoint_control
    address: 0x6300            # Bedien WW Solltemperatur (writable)
    length: 1
    converter: noconv
    unit_of_measurement: "°C"
    min_value: 10
    max_value: 95
    step: 1
    mode: box
    update_interval: 3600s

select:
  # The "Betriebsart switch" referenced by the debug block above. Writes the
  # operating mode at 0x2323 (BedienteilBA, the Virtual_WRITE target for this
  # variant). Writes are HARDWARE-CONFIRMED: the byte read back at 0x2323 reflects
  # what was written, and all 5 options round-trip (write -> ACK -> read-back).
  #
  # 0x2323 (BedienteilBA, 5 values) is a DIFFERENT enum from 0x2301 (the actual
  # mode, 6 values, which openv/vcontrold drive); the controller translates
  # 0x2323 -> 0x2301. Labels below use vcontrold's "BA" vocabulary
  # (openv/vcontrold xml/300/vcontrold.xml, unit "BA"). Values 0 and 3 are
  # log-confirmed via the 0x2301 read-back (0 -> ABSCHALT, 3 -> RED); 1/2/4 follow
  # the canonical BedienteilBA order and are consistent with that mapping but not
  # yet directly observed. Observed translation 0x2323 -> 0x2301: 0->5, 3->1
  # (predicted full map 0->5 1->0 2->3 3->1 4->2).
  - platform: vitohome
    name: "Operating Mode (set) [A1]"
    id: operating_mode_set_a1
    address: 0x2323
    length: 1
    update_interval: 30s
    options:
      0x00: "Abschaltbetrieb"
      0x01: "Nur Warmwasser"
      0x02: "Heizen und Warmwasser"
      0x03: "Reduziert"
      0x04: "Normal"

  # Party and economy have a read/write address split like Betriebsart, but
  # here read and write share the same on/off domain, so ONE two-address select
  # is correct: it WRITES the command address and READS the live state address.
  # Confirm on hardware that toggling actually moves the state.
  - platform: vitohome
    name: "Party Mode [A1]"
    id: party_mode_a1
    address: 0x2330            # command (NRx Partybetrieb)
    state_address: 0x2303      # live state (BedienPartybetrieb)
    length: 1
    update_interval: 30s
    options:
      0x00: "Off"
      0x01: "On"
  - platform: vitohome
    name: "Economy Mode [A1]"
    id: economy_mode_a1
    address: 0x2331            # command (NRx Sparbetrieb)
    state_address: 0x2302      # live state (BedienSparbetrieb)
    length: 1
    update_interval: 30s
    options:
      0x00: "Off"
      0x01: "On"
