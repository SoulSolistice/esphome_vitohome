# ============================================================
# vitohome - VScotHO1_72 comprehensive package
#
# This file has two jobs and is written to serve both:
#
#   (a) REFERENCE UNIT. It mirrors the maintainer's Vitodens 300-W (B3HA,
#       Vitotronic 200, wire ident 0x20CB, KW/VS1) so every change can be
#       validated against real hardware logs. That unit is HEATING-ONLY:
#       it has NO DHW cylinder and no tank sensor. The DHW entities below
#       are therefore mostly inert here (see "DHW on this unit" below) --
#       they are kept deliberately, both as platform coverage and as the
#       template a tank-equipped user starts from.
#
#   (b) STARTING POINT. It is the showcase config: comprehensive MONITORING
#       (temperatures incl. flow / return / flue gas, burner modulation and
#       counters, volume flow, pump speed) plus CONTROL of the typical
#       features (room climate with operating modes, DHW setpoint incl. a
#       native water_heater card, party / economy switches, heating curve,
#       switching-time programs) - exercising every platform the component
#       offers: sensor, binary_sensor (incl. the hub-fed connectivity
#       diagnostic), text_sensor (device_id / enum / error_history / ascii /
#       utf16), number, select, switch, climate, text (Schaltzeiten), event
#       (fault events) and an ESPHome template water_heater on top. It also
#       demonstrates the advanced concepts: aligned block reads with
#       byte_offset, read/write address splits, single-writer discipline on a
#       shared register, and hardware-evidenced bit masks.
#
# Every datapoint is Optolink-reachable and uses the field-accurate
# address/length/converter from the generated catalog; hand-tuned entries
# carry their hardware evidence in comments. Entities are ENABLED by
# default so the set works out of the box; the exceptions carry a reason
# next to `disabled_by_default:` / `internal:`.
#
# ---- DHW on this unit ------------------------------------------------
# Betriebsart (0x2323, BedienteilBA_GWGA1) is a SINGLE mutually exclusive
# 5-value program: 0 Abschalt / 1 Nur WW / 2 Heizen + WW / 3 Dauernd
# Reduziert / 4 Dauernd Normal. There is no separate "DHW on" flag, so the
# climate presets and any DHW mode control fight over one register. This
# package resolves that by giving 0x2323 exactly ONE writer (the climate
# entity); the Betriebsart `select` is `internal: true` (read-side probe,
# never writes), and the water_heater exposes temperature only, deriving its
# displayed mode read-only from 0x2323.
# On the reference unit, with no cylinder fitted: 0x0812 (WW Ist) reads a
# frozen 20.0 degC, 0x6500 (WW Soll aktuell) a frozen 5.0 degC and 0x6513
# (Speicherladepumpe) never leaves "Off" -- across a full burner cycle, and in
# both Betriebsart values that enable DHW (0x01 "Nur Warmwasser" in the idle
# log, 0x02 "Heizen und Warmwasser" in the burn log). Hardware-confirmed,
# 2026-07-09. Those entities are marked `entity_category: diagnostic` here; on
# a tank-equipped unit they carry real values, so promote them.
#
# The DHW card itself needed a real fix, not just a label: see the
# `optimistic: true` note at the water_heater below. With `optimistic: false`
# the temperature slider was a silent no-op on ANY unit, tank or not.
#
# ---- Raw scan console ------------------------------------------------
# The hub's raw lane (`queue_raw_read` / `queue_raw_write` + a hub-fed
# `text_sensor: type: scan_result`) is wired up at the bottom of this file. It
# is how every "CAPTURE" question below gets answered without a rebuild: type an
# address, press read, look at the result. The READ side is safe. The WRITE side
# is `disabled_by_default: true` and can brick a coding address -- read the
# comment next to it before you enable it.
# The console assumes the hub is `id: vito` (as in vscotho1_72.vitohome.yaml),
# which is already true of the connectivity sensor's refresh_all() lambda above.
#
# ---- Open captures ---------------------------------------------------
# Entities marked "CAPTURE" exist to settle a specific open question on
# hardware, not because a dashboard needs them. Each says which. Delete them
# once the question is closed (they cost bus time).
#
# USAGE - define uart + vitohome hub in your device YAML and include this
# file via packages: (see vscotho1_72.vitohome.yaml, which also wires
# time_sync for the device clock and turns on `log_frames`).
#
# VERIFY ON HARDWARE: addresses come from the Vitosoft catalog for this
# variant; confirm with `esphome config` then `esphome run` before relying
# on a value. Sub-zero temperatures exercise the signed paths: div10 is
# signed by default (Außen), but div100/noconv are not, so the return
# sensor and the Niveau offset carry an explicit `signed: true`.
# ============================================================

sensor:
  # --- Temperatures -------------------------------------------------------
  - platform: vitohome
    name: "Temperatur Außen"
    id: TiefpassTemperaturwert_ATS
    address: 0x5525            # ATS, low-pass filtered
    length: 2
    converter: div10
    # Catalog border is -60..60 °C: the range crosses zero, so signedness
    # matters. No explicit `signed:` needed here -- div10 is signed by default
    # in the component (unlike div100/noconv), so sub-zero outdoor temps
    # decode correctly. (source-confirmed: CONVERTERS['div10'].default_signed.)
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    icon: "mdi:thermometer"
    update_interval: 60s

  - platform: vitohome
    name: "Temperatur Kessel Soll"
    id: Kesselsoll_eff
    address: 0x555A            # Kesselsoll eff
    length: 2
    converter: div10
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    icon: "mdi:thermometer-lines"
    update_interval: 60s

  - platform: vitohome
    name: "Temperatur Kessel Ist"
    id: TiefpassTemperaturwert_KTS
    address: 0x0810            # KTS, boiler water (low-pass; vcontrold uses raw 0x0802)
    length: 2
    converter: div10
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    icon: "mdi:water-boiler"
    update_interval: 60s

  - platform: vitohome
    name: "Temperatur Abgas"
    id: TiefpassTemperaturwert_AGTS
    address: 0x0816            # AGTS, Abgas (low-pass; vcontrold uses raw 0x0808 for 0x20CB)
    length: 2
    converter: div10
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    icon: "mdi:smoke"
    update_interval: 60s

  - platform: vitohome
    name: "Temperatur Vorlauf Ist"
    id: VorlauftemperaturM1
    address: 0x2900            # Vorlauftemperatur M1/A1
    length: 2
    converter: div10
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    icon: "mdi:thermometer-chevron-up"
    update_interval: 60s

  - platform: vitohome
    name: "Temperatur Vorlauf Soll"
    id: VT_SolltemperaturA1M1
    address: 0x2544            # VT Solltemperatur A1M1 (demanded flow)
    length: 2
    converter: div10
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    icon: "mdi:thermometer-lines"
    update_interval: 60s

  - platform: vitohome
    name: "Temperatur Rücklauf"
    id: Neptun_Temperatur_STRS1
    address: 0x0C20            # STRS1 return sensor (div100!)
    length: 2
    converter: div100
    signed: true
    # div100 is UNSIGNED by default in the component (only div2/div10 are
    # signed) and the Vitosoft catalog carries no border for this Neptun
    # sensor, so the generator emits it unsigned. A return-water sensor can
    # read sub-zero on a fault/disconnect, which would misdecode as ~+655 °C
    # (0xFFxx read big); force signed so a negative reads correctly.
    # (model-derived: domain knowledge the catalog does not encode.)
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    icon: "mdi:thermometer-chevron-down"
    update_interval: 60s

  # DHW tank temperature, low-pass filtered. Vitosoft:
  # TiefpassTemperaturwertWW1~0x0812, BlockLength 2, Div10, Read.
  # vcontrold reads the same address as getTempStp ("Speichertemperatur
  # (Tiefpass)"). On the reference unit (no cylinder) it is frozen at exactly
  # 20.0 degC in every sample of both 2026-07-09 logs (2 idle + 5 during a
  # burn), so it is diagnostic here. vcontrold's getTempWWist reads the RAW
  # sensor at 0x0804 instead -- added below as a CAPTURE, to tell "cold tank"
  # apart from "no sensor".
  - platform: vitohome
    name: "Temperatur Warmwasser Ist"
    id: TiefpassTemperaturwertWW1
    address: 0x0812            # WW1 / Speicher (top), Tiefpass
    length: 2
    converter: div10
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    entity_category: diagnostic
    icon: "mdi:water-thermometer"
    update_interval: 60s

  # WW_SolltemperaturAktuell: the setpoint the controller is actually acting
  # on. Vitosoft: BlockLength 2, Div10, Read (borders 10..95 degC).
  # Reference unit: reads a frozen 5.0 degC -- BELOW the datapoint's own lower
  # border -- in all 7 samples across both 2026-07-09 logs, and it did NOT
  # follow the 50 -> 49 -> 48 writes to 0x6300, nor a Betriebsart change to
  # "Heizen und Warmwasser". It is NOT a mirror of 0x6300. Reading it as "no
  # DHW demand configured" on a unit with no cylinder.
  - platform: vitohome
    name: "Temperatur Warmwasser Soll"
    id: WW_SolltemperaturAktuell
    address: 0x6500            # WW Solltemperatur aktuell (effective, read-back)
    length: 2
    converter: div10
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    entity_category: diagnostic
    icon: "mdi:thermometer-water"
    update_interval: 60s

  # CAPTURE - raw DHW tank sensor. Vitosoft: ADC_IstTemperaturwert_STS1~0x0804,
  # BlockLength 2, Div10, Read. vcontrold reads this address as getTempWWist
  # ("Warmwassertemperatur in Grad C").
  # ANSWERED, 2026-07-10 log: 0x0804 reads a constant
  # 20.000 degC, identical to the low-pass 0x0812, across a full burner cycle in
  # which the boiler went 25 -> 35 degC. A real sensor would have moved. Read
  # together with "HK1 WW-Freigabe" (which shows DHW IS released) and a storage
  # pump that never runs, this is a unit with no cylinder and no tank sensor.
  # Delete both, or promote them on a tank-equipped unit.
  - platform: vitohome
    name: "Temperatur Warmwasser Ist (Rohsensor)"
    id: ADC_IstTemperaturwert_STS1
    address: 0x0804
    length: 2
    converter: div10
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    entity_category: diagnostic
    icon: "mdi:water-thermometer-outline"
    update_interval: 300s

  # --- Burner -------------------------------------------------------------
  # nvoBoilerState_BLR_value: byte 0 of the 2-byte block at 0xA305, Div2.
  # Byte 1 of the same block is nvoBoilerState_BLR_state (0 = AUS, 1 = EIN) --
  # see the "Status Brenner" binary_sensor below, which reads it as a byte
  # rather than guessing a bit.
  # 30s was a no-op: the hub tick is 60s and anything shorter degrades to it
  # (the hub warns at setup). Say 60s and mean it.
  - platform: vitohome
    name: "Brenner Modulation"
    id: nvoBoilerState_BLR_value
    address: 0xA305            # nvoBoilerState value (byte 0, x0.5)
    length: 1
    converter: div2
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 1
    icon: "mdi:fire"
    update_interval: 60s

  # CAPTURE - byte 0 of the 9-byte block at 0x55D3, read as an integer percent.
  # PROVENANCE, exactly: vcontrold's getBrennerStatus carries an explicit
  # <device ID="20CB"> override reading 0x55D3, len 1, unit PR1 ("Prozent
  # 1 Byte ganzzahlig") -- see openv/vcontrold xml/300/vito.xml and the PR1
  # unit in xml/300/vcontrold.xml. Vitosoft declares NO percent datapoint at
  # 0x55D3 for this family: the block carries GWG_Flamme (BitPosition 42) and
  # GWG_Verriegelung (BitPosition 41); a 1-byte VSorp_Anlagendruck sits at the
  # same address for a different family. So the percent reading is vcontrold's
  # claim, not Viessmann's.
  # ANSWERED, 2026-07-10 log: it is NOT the burner modulation. Read straight
  # off the wire in the same poll burst:
  #   modulation (0xA305[0] x 0.5) =  0 %  ->  0x55D3 = 0x00 (0)
  #   modulation                   = 11 %  ->  0x55D3 = 0x10 (16)
  #   modulation                   = 15 %  ->  0x55D3 = 0x14 (20)
  #   modulation                   =  0 %  ->  0x55D3 = 0x1B (27)   <-- burner OFF
  # The last sample kills it: `>>> F7:A3:05:01` -> `<<< 00` (burner off,
  # Status Brenner OFF) while `>>> F7:55:D3:01` -> `<<< 1B`. vcontrold's PR1
  # override reads a real byte, but it is not modulation on this unit -- the
  # ramp during post-purge suggests a fan/blower quantity (model-derived).
  # Left enabled as an open question; delete if you do not care.
  - platform: vitohome
    name: "Brennerstatus (0x55D3, vcontrold)"
    id: Brennerstatus_55D3
    address: 0x55D3
    length: 1
    converter: noconv
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 0
    entity_category: diagnostic
    icon: "mdi:fire"
    update_interval: 60s

  # CAPTURE - nvoPWRState_CFDM_value: Vitosoft says BlockLength 2, BytePosition
  # 0, ByteLength 1, Div2 -- i.e. a 1-byte field at the block base. vcontrold's
  # getLeistungIst ("Anlagen Ist-Leistung") reads the same address with len 2
  # and unit PR3. THE TWO DISAGREE on the width, so this entity follows Vitosoft
  # (1 byte, /2) and is a capture, not a settled reading.
  # ANSWERED, 2026-07-10 log: correlated with 0xA305 but NOT identical --
  # 0/0, 10/11, 15/15, 0/0 (Brennerleistung / Brenner Modulation). The 10-vs-11
  # sample (raw 20 vs 22) is a real difference, so both are worth keeping.
  # Vitosoft's 1-byte /2 reading yields sensible percentages; vcontrold's 2-byte
  # PR3 does not fit these values. Following Vitosoft.
  - platform: vitohome
    name: "Brennerleistung"
    id: nvoPWRState_CFDM_value
    address: 0xA38F
    length: 1
    converter: div2
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 1
    entity_category: diagnostic
    icon: "mdi:gauge"
    update_interval: 60s

  - platform: vitohome
    name: "Brenner Betriebsstunden"
    id: BetriebsstundenBrenner1
    address: 0x0886            # Betriebsstunden Brenner 1
    length: 4
    converter: sec2hour
    unit_of_measurement: "h"
    device_class: duration
    state_class: total_increasing
    accuracy_decimals: 1
    icon: "mdi:timer"
    update_interval: 600s
    # 0x0886 (BetriebsstundenBrenner1) vs 0x08A7
    # (BetriebsstundenBrennerBedienungGWG): Vitosoft lists Write/Reset variants
    # for 0x08A7 only, i.e. 0x08A7 is the resettable service counter, which is
    # why this entity uses 0x0886 for `total_increasing`.
    # Confirmed live: the raw advanced E6:EB:A5:0C (0x0CA5EBE6 = 212200422 s =
    # 58944.5617 h) -> F3:EB:A5:0C (0x0CA5EBF3 = 212200435 s = 58944.5653 h),
    # i.e. +13 burner-on seconds between the two 2026-07-09 logs, matching the
    # published values exactly.

  # ANSWERED, 2026-07-10 log: 0x08A7 and 0x0886 read the SAME value
  # (58944.688 h, same poll burst). The service counter has never been reset on
  # this unit, so it carries no information 0x0886 does not. Keep it only if you
  # want to detect a future reset; otherwise delete.
  # (vcontrold reads it as getBrennerStunden1, len 4, unit CS, and can write it
  # back via setBrennerStunden1.)
  - platform: vitohome
    name: "Brenner Betriebsstunden (Bedienung)"
    id: BetriebsstundenBrennerBedienungGWG
    address: 0x08A7
    length: 4
    converter: sec2hour
    unit_of_measurement: "h"
    device_class: duration
    state_class: total_increasing
    accuracy_decimals: 1
    entity_category: diagnostic
    icon: "mdi:timer-outline"
    update_interval: 3600s

  - platform: vitohome
    name: "Brenner Starts"
    id: BrennerstartsGWG
    address: 0x088A            # Brennerstarts (read-only here)
    length: 4
    converter: noconv
    state_class: total_increasing
    icon: "mdi:counter"
    update_interval: 3600s

  # --- Hydraulics: volume flow & pump power --------------------------------
  - platform: vitohome
    name: "Volumenstrom"
    id: Neptun_Durchfluss_STRS1
    address: 0x0C24            # Durchfluss STRS1; raw l/h (see note below)
    length: 2
    converter: noconv
    unit_of_measurement: "L/h"
    state_class: measurement
    icon: "mdi:water-sync"
    update_interval: 60s
    # NOTE: a scaling factor exists at 0x0C26 (Skalierung Durchfluss). If the
    # raw value looks off by a constant factor, divide by that on the HA side.

  # Vitosoft calls 0x0A3C `InternePumpeDrehzahl_res` (BlockLength 1,
  # NoConversion, Read); "Pumpenleistung" is this file's display name.
  # DUPLICATE, hardware-confirmed. The 2026-07-09 logs had all three pump
  # readings equal, which proved nothing; the 2026-07-10 log supplies the
  # discriminating sample. At 06:04:43, during pump overrun after a burn:
  #   0x0A3C -> `<<< 0A`     = 10
  #   0x7660 -> `<<< 01:0A`  byte 1 = 10   (Interne Pumpe)
  #   0x7663 -> `<<< 00:00`  byte 1 =  0   (Heizkreispumpe, and 0xA152 bit 10 clear)
  # So 0x0A3C tracks 0x7660[1] and is a genuine duplicate of "Interne Pumpe
  # Drehzahl"; the heating-circuit pump is a different quantity. Drop one.
  - platform: vitohome
    name: "Pumpenleistung"
    id: Pumpenleistung
    address: 0x0A3C            # InternePumpeDrehzahl_res
    length: 1
    converter: noconv
    unit_of_measurement: "%"
    state_class: measurement
    entity_category: diagnostic
    icon: "mdi:pump"
    update_interval: 60s

  - platform: vitohome
    name: "Interne Pumpe Drehzahl"
    id: InternePumpeDrehzahl
    # Read the 2-byte block at its BASE (0x7660) and extract byte 1 via
    # byte_offset. The interior address 0x7661 works on KW (byte-oriented)
    # but P300 rejects the unaligned single-byte read with an error frame
    # (hardware-confirmed, P300 log 2026-07-04: "03:01:76:61:01:01" error);
    # reading the aligned block is portable across both protocols.
    address: 0x7660
    length: 2
    byte_offset: 1
    converter: noconv
    unit_of_measurement: "%"
    state_class: measurement
    icon: "mdi:fan"
    update_interval: 60s
    # NOTE: an earlier revision filtered `x >= 255 -> NAN` here, on the model
    # that the device reports 0xFF while the pump is off. Both 2026-07-09 logs
    # contradict it: this entity publishes 0.000 in every idle sample and
    # 22.000/24.000 while the burner runs. It never reads 255, so the filter
    # only ever risked masking a real value. Removed rather than left in as a
    # comment-shaped myth.

  - platform: vitohome
    name: "Heizkreispumpe Drehzahl"
    id: HKP_A1Drehzahl
    # Block base 0x7663 + byte_offset 1 (see Interne Pumpe above): the
    # interior address 0x7664 errors on P300 (hardware-confirmed,
    # "03:01:76:64:01:01"). Aligned block read is portable.
    address: 0x7663
    length: 2
    byte_offset: 1
    converter: noconv
    unit_of_measurement: "%"
    state_class: measurement
    icon: "mdi:fan"
    update_interval: 60s
    # Same story as "Interne Pumpe Drehzahl": no 255 sentinel was ever observed
    # (0.000 idle, 22.000/24.000 during a burn), so the `x >= 255 -> NAN`
    # filter that used to sit here is gone too.

  # HK_RaumsolltemperaturaktuellA1M1~0x2500. Vitosoft: BlockLength 22,
  # BytePosition 12, ByteLength 2, Div10, Read -- i.e. bytes 12..13 of the block.
  # ANSWERED, 2026-07-10 log: this is the ACTIVE ROOM SETPOINT, not the room
  # temperature. It read 19.0 degC while HK1 Aktuelle Betriebsart was
  # "Abschaltbetrieb" (= Raumsoll Reduziert) and 34.0 degC under "Normalbetrieb"
  # (= the climate target). Do NOT wire it to the climate entity's
  # `current_temperature`: it would display the setpoint as the measurement.
  # Keep it as the honest answer to "what is the controller actually aiming at
  # right now", which neither 0x2306 nor 0x2307 tells you on its own.
  - platform: vitohome
    name: "Raumsoll aktuell HK1"
    id: HK_RaumsolltemperaturaktuellA1M1
    address: 0x2500            # block base (aligned read; P300 NAKs interiors)
    length: 22
    byte_offset: 12
    byte_length: 2
    converter: div10
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    entity_category: diagnostic
    icon: "mdi:home-thermometer"
    update_interval: 300s

  # CAPTURE - nvoRelayState_*~0xA152: a 2-byte relay bitfield. Vitosoft gives
  # every relay an absolute BitPosition 0..15 across the block; under MSB-first
  # numbering, bit N lives in byte N/8 with mask 0x80 >> (N % 8):
  #   0 Zubringerpumpe   -> byte 0, 0x80      8 SLP  -> byte 1, 0x80
  #   2 Interne_Pumpe    -> byte 0, 0x20      9 ZP   -> byte 1, 0x40
  #   3 UV_Heizen        -> byte 0, 0x10     10 HKP1 -> byte 1, 0x20
  #   5 UV_Warmwasser    -> byte 0, 0x04
  #   6 Brenner          -> byte 0, 0x02
  #   7 Sammelstoerung   -> byte 0, 0x01
  # (Several names alias one bit across device families, e.g. Brennerstufe1
  # also sits at 6 and TSA_Kontakt at 5 -- check the family before trusting a
  # name.) Question it answers: read as a raw 16-bit value during a burn, with
  # the HK pump running and the storage pump idle, it pins the numbering
  # against four simultaneously-known relay states -- the last piece of evidence
  # ANSWERED, 2026-07-10 log. Decoded little-endian (byte 0 = low 8 bits;
  # proven on the wire: `>>> F7:A1:52:02` -> `<<< 04:00` -> 4.000). Four states,
  # every bit consistent with independently-read registers:
  #   0x0004  b0=0x04            UV_Warmwasser          idle, Umschaltventil="Richtung Warmwasser", HKP off
  #   0x0024  b0=0x24            + Interne_Pumpe        pump overrun after a burn (0x7660[1]=10, 0x7663[1]=0)
  #   0x20B0  b0=0xB0 b1=0x20    Zubringer+Interne+UV_Heizen+HKP1   heating, burner OFF
  #   0x20B2  b0=0xB2 b1=0x20    + Brenner              burner ON (0xA305[1]=0x01, modulation 11/15 %)
  # Under LSB-first, 0xB2 would raise Sammelstoerung and leave Brenner clear
  # while the boiler demonstrably fires -- falsified. MSB-first is now confirmed
  # on a SECOND, independent register. Sammelstoerung never set.
  # This entity has done its job; replace it with individual binary_sensors
  # (length 2, byte_offset 0/1, masks from the table above) or delete it.
  - platform: vitohome
    name: "Relaisstatus (roh)"
    id: nvoRelayState_raw
    address: 0xA152
    length: 2
    converter: noconv
    state_class: measurement
    accuracy_decimals: 0
    entity_category: diagnostic
    icon: "mdi:electric-switch"
    update_interval: 60s

binary_sensor:
  # Burner state, straight from the byte the controller publishes for it:
  # nvoBoilerState_BLR_state is byte 1 of the 2-byte block at 0xA305
  # (0 = AUS, 1 = EIN). bit_mask 0xFF = "any nonzero byte". This is the
  # authoritative source -- no bit-numbering convention involved -- and it
  # shares its block base with the modulation sensor above.
  - platform: vitohome
    name: "Status Brenner"
    id: nvoBoilerState_BLR_state
    address: 0xA305
    length: 2
    byte_offset: 1
    bit_mask: 0xFF
    device_class: running
    icon: "mdi:fire"
    update_interval: 60s

  # GWG_Flamme1 @ 0x55DD, BitPosition 2, BitLength 1.
  # bit_mask 0x20, NOT 0x04: Vitosoft numbers bits MSB-FIRST inside the byte
  # (index 0 = 0x80), so BitPosition 2 -> 0x80 >> 2 = 0x20.
  # HARDWARE-CONFIRMED, 2026-07-09 logs, 8 samples, no exceptions:
  #   modulation 0 %                 -> raw 0x01 (3 samples)
  #   modulation 11..40 %, Abgas +6K -> raw 0x21 (5 samples)
  # Bit 0x04 is never set in either state; bit 0x20 tracks the burn exactly.
  # Under LSB-first, 0x04 would be GWG_Flamme1 -- "no flame" while the boiler
  # burns -- which is impossible. Cross-check it against "Status Brenner" above.
  # THEY MAY DISAGREE FOR ONE POLL DURING IGNITION: on 2026-07-10 at 06:40:27
  # the flame bit read 0x21 (ON) 143 ms after 0xA305 byte 1 read 0x00 (OFF) and
  # after the 0xA152 Brenner bit read clear. The flame is detected before the
  # controller publishes "burner = EIN". That is a race between three separate
  # telegrams, not a bit-numbering error -- under LSB-first the same sample
  # would claim a second burner STAGE was running while the burner was off.
  - platform: vitohome
    name: "Status Brenner Flamme"
    id: GWG_Flamme1
    address: 0x55DD
    length: 1
    bit_mask: 0x20
    device_class: running
    icon: "mdi:fire"
    update_interval: 60s

  # GWG_Brenner_2 @ 0x55DD, BitPosition 5 -> 0x80 >> 5 = 0x04, the mask this
  # file used to hand to GWG_Flamme1. It is the LSB-first hypothesis made
  # falsifiable. ANSWERED, 2026-07-10 log: OFF in all 8 samples, including both
  # in which the burner fired (raw 0x21). Meanwhile "Status Brenner Flamme"
  # (mask 0x20) and "Status Brenner" (0xA305[1], no bit convention at all)
  # agreed 8/8. Re-confirmed on P300 (2026-07-10): OFF in all 9 samples, raw
  # 0x21 during both burns. MSB-first stands. Kept as a permanent tripwire: if
  # this ever goes ON while the flame bit is OFF, scripts/gen_catalog.py is
  # wrong. (A one-poll disagreement between the flame bit and "Status Brenner"
  # during ignition is expected -- see that entity.)
  - platform: vitohome
    name: "Brennerstufe 2"
    id: GWG_Brenner_2
    address: 0x55DD
    length: 1
    bit_mask: 0x04
    device_class: running
    entity_category: diagnostic
    disabled_by_default: true
    icon: "mdi:fire-alert"
    update_interval: 60s

  # HK_Frostgefahr_aktivA1M1: bit 135 of the 22-byte block at 0x2500 -- byte
  # 16 (135 = 16*8 + 7), in-byte index 7 -> mask 0x01 under MSB-first.
  # The block is read at its BASE and indexed with byte_offset: an interior
  # single-byte read at 0x2510 is unaligned and NAKs on P300. It also read a
  # constant 0xFF on KW (i.e. ON at 14 degC outdoor, in July), which is what
  # the earlier `address: 0x2510, bit_mask: 0x80` entity was reporting.
  # CONFIRMED, 2026-07-10 log: `>>> F7:25:00:16` ->
  # `<<< 02:00:00:00:00:00:00:00:01:00:00:01:BE:00:00:00:00:00:00:00:BE:00`
  # -- byte 16 = 0x00 -> OFF. (The same telegram also yields byte 1 = 0x00
  # "Abschaltbetrieb", byte 8 = 0x01 "Freigabe nach WW-Schaltzeiten", and bytes
  # 12..13 = 0x00BE = 190 -> 19.0 degC, all matching their entities exactly.)
  # And on P300 (2026-07-10), which is the whole point of reading at the block
  # base: `>>> 41:05:00:01:25:00:16` ->
  # `<<< 06:41:1B:01:01:25:00:16:02:00:...:B4:00:C4` -- one 22-byte telegram,
  # accepted. An interior read at 0x2510 would have been NAKed.
  - platform: vitohome
    name: "Frostgefahr HK1"
    id: HK_Frostgefahr_aktivA1M1
    address: 0x2500            # block base
    length: 22
    byte_offset: 16
    bit_mask: 0x01
    device_class: cold
    entity_category: diagnostic
    icon: "mdi:snowflake-alert"
    update_interval: 300s

  # Hub-fed Optolink link diagnostic: ONLINE on any successful response,
  # OFFLINE after 3 consecutive protocol errors or when start-up protocol
  # verification fails. Never polls; edge-published.
  # on_press (off->on edge) force-refreshes every datapoint, so slow-tier
  # entities (coding values at 3600s, counters at 600s) un-stale themselves
  # the moment the link recovers instead of waiting out their intervals.
  # The very first ONLINE at boot also fires this; harmless -- everything is
  # due at boot anyway and refresh_all() is debounced (5 s) in the hub.
  - platform: vitohome
    type: connectivity
    name: "Optolink Verbindung"
    id: optolink_link
    on_press:
      then:
        - lambda: "id(vito).refresh_all();"

text_sensor:
  # Raw scan console result surface. Hub-fed: no address, never polled. Every
  # queue_raw_read()/queue_raw_write() result lands here as the response bytes
  # plus exact 64-bit integer views (no float32 narrowing on 4-byte counters).
  # See the `button:` section for the inputs.
  - platform: vitohome
    type: scan_result
    id: scan_raw
    name: "Scan · Rohergebnis"
    icon: "mdi:magnify-scan"
    entity_category: diagnostic

  - platform: vitohome
    type: device_id
    name: "Gerätetyp"
    id: device_type
    icon: "mdi:identifier"
    entity_category: diagnostic

  - platform: vitohome
    type: enum
    name: "Status Pumpe Heizkreis"
    id: HK_PumpenzustandA1M1
    address: 0x2906            # HK Pumpenzustand A1M1
    length: 1
    icon: "mdi:pump"
    update_interval: 60s
    options:
      0x00: "Off"
      0x01: "On"

  # Never leaves 0 on the reference unit (no cylinder). Diagnostic here.
  - platform: vitohome
    type: enum
    name: "Status Speicherladepumpe"
    id: Speicherladepumpe
    address: 0x6513            # Speicherladepumpe
    length: 1
    icon: "mdi:pump"
    entity_category: diagnostic
    update_interval: 60s
    options:
      0x00: "Off"
      0x01: "On"

  # Zirkulationspumpe~0x6515. Vitosoft: BlockLength 1, NoConversion, Read,
  # ValueList 0=AUS / 1=EIN. vcontrold's getPumpeStatusZirku carries a
  # <device ID="20CB"> override reading exactly this address, len 1.
  - platform: vitohome
    type: enum
    name: "Status Zirkulationspumpe"
    id: Zirkulationspumpe
    address: 0x6515
    length: 1
    icon: "mdi:pump"
    entity_category: diagnostic
    update_interval: 60s
    options:
      0x00: "Off"
      0x01: "On"

  # CAPTURE - Umschaltventil~0x0A10 (diverter valve). Vitosoft: BlockLength 1,
  # NoConversion, Read, ValueList exactly as below (labels resolved from
  # DPDefinitions ecnEventValueType). vcontrold reads the same address as
  # getUmschaltventil with unit USV. Question it answers: on a unit whose DHW
  # never runs, where does the valve actually sit? It is also the clearest
  # single diagnostic for "is the boiler heating the house or the tank".
  # NOTE Vitosoft marks it Read; vcontrold also ships setUmschaltventil. Do not
  # write to it.
  - platform: vitohome
    type: enum
    name: "Umschaltventil"
    id: Umschaltventil
    address: 0x0A10
    length: 1
    icon: "mdi:valve"
    entity_category: diagnostic
    update_interval: 60s
    options:
      0x00: "undefiniert"
      0x01: "Richtung Heizen"
      0x02: "Mittelstellung"
      0x03: "Richtung Warmwasser"

  # CAPTURE - HK_AktuelleBetriebsartA1M1: byte 1 of the 22-byte block at
  # 0x2500. This is the ACTUAL mode of the heating circuit, as opposed to
  # 0x2301 (BedienBetriebsart, the operator-set mode the climate entity reads)
  # and 0x2323 (the command register it writes). Question it answers: does the
  # schedule/panel move the circuit between Normal and Reduziert independently
  # of BedienBetriebsart?
  - platform: vitohome
    type: enum
    name: "HK1 Aktuelle Betriebsart"
    id: HK_AktuelleBetriebsartA1M1
    address: 0x2500            # block base
    length: 22
    byte_offset: 1
    icon: "mdi:radiator"
    entity_category: diagnostic
    update_interval: 300s
    options:
      0x00: "Abschaltbetrieb"
      0x01: "Reduzierter Betrieb"
      0x02: "Normalbetrieb"
      0x03: "Normalbetrieb"

  # HK_WW_Freigabe_vonA1M1: byte 8 of the 0x2500 block -- the DHW RELEASE.
  # ANSWERED, 2026-07-10 log: it reads "Freigabe nach WW-Schaltzeiten" and
  # "Freigabe durch Party/Externe Umschaltung". DHW is RELEASED. The storage
  # pump still never runs and 0x0804 never moves, so the missing piece is the
  # cylinder, not a schedule or a coding address. Keep as a diagnostic.
  - platform: vitohome
    type: enum
    name: "HK1 WW-Freigabe"
    id: HK_WW_Freigabe_vonA1M1
    address: 0x2500            # block base
    length: 22
    byte_offset: 8
    icon: "mdi:water-check"
    entity_category: diagnostic
    update_interval: 300s
    options:
      0x00: "Freigabe aus"
      0x01: "Freigabe nach WW-Schaltzeiten"
      0x02: "Freigabe durch Party/Externe Umschaltung"

  # Not-in-catalog circuit label, UTF-16LE (Beschriftung HK1, byte 2 of the
  # 42-byte block @ 0x7360). DISABLED by default: the 40-byte read succeeds
  # on KW but EXCEEDS the P300/VS2 single-telegram payload cap -- P300
  # returns an error frame (hardware-confirmed 2026-07-04) and the entity
  # goes NAN/unavailable there. Enable only on KW, or shorten `length` to
  # fit a single P300 telegram if you only need the first few characters.
  # CAPTURE - the heating-circuit label, and a correction.
  #
  # This entity used to read `address: 0x7362, length: 40`. THAT ADDRESS DOES
  # NOT EXIST. The datapoint is `Beschriftung_HK1~0x7360`: BlockLength 42,
  # BytePosition 2, ByteLength 40. The catalog generator fabricated 0x7362 by
  # adding BytePosition to the block base -- an unaligned INTERIOR read, the
  # exact thing this file warns about everywhere else.
  # Hardware, 2026-07-10, P300 (raw scan console):
  #   >>> 41:05:00:01:73:62:02:DD            (read 0x7362, TWO bytes)
  #   <<< 06:41:06:03:01:73:62:01:01:E1      (MessageIdentifier 0x03 = Error)
  # Byte-identical to the error the 40-byte read produced. The width was never
  # the problem. On KW the same address returns 0xFF fill, which decodes to an
  # empty string -- which is why this looked like "an unnamed circuit" for so
  # long instead of a bug.
  #
  # Correct shape: aligned block read at the base + byte_offset, exactly like
  # Frostgefahr at 0x2500. HARDWARE-CONFIRMED 2026-07-10 (P300, raw console):
  #   >>> 41:05:00:01:73:60:20:F9                     (read 0x7360, 32 bytes)
  #   <<< 06:41:25:01:01:73:60:20:00:0B:48:00:65:00:69:00:7A:00:6B:00:72:00:
  #              65:00:69:00:73:00:20:00:31:00:FF:FF:FF:FF:FF:FF:FF:FF:1C
  # MessageIdentifier 0x01 (a response, not an error). Checksum 0x1C verified.
  # Layout of the 42-byte block:
  #   byte 0      0x00
  #   byte 1      0x0B = 11 -- the label's CHARACTER COUNT (hardware-confirmed:
  #               "Heizkreis 1" is exactly 11 characters)
  #   bytes 2..41 the UTF-16LE label, 20 code units, unused slots 0xFFFF fill
  # decode_utf16() skips 0xFFFF fill and trims trailing spaces, so this entity
  # publishes "Heizkreis 1".
  #
  # A 42-byte read of the whole block is HARDWARE-CONFIRMED on P300
  # (2026-07-10): `>>> 41:05:00:01:73:60:2A:03` -> length byte 0x2F = 47,
  # MessageIdentifier 0x01, checksum 0x2B. So `length: 42, byte_length: 40` is
  # what this entity uses -- the faithful field, all 20 code units.
  # That read also showed the padding is a BYTE run, not code-unit aligned:
  # thirteen 0xFF then five 0x00, so code unit 17 is 0x00FF. decode_utf16() now
  # TERMINATES on 0xFFFF rather than skipping it; before that fix the full field
  # published "Heizkreis 1ÿ".
  #
  # Bytes 0..1 are declared by NO datapoint in the Vitosoft export. And note the
  # address is overloaded across device families: on heat-pump (WPR) tokens,
  # 0x7360 / 0x7361 / 0x7362 are three separate 1-byte datapoints.
  - platform: vitohome
    type: utf16
    name: "Beschriftung HK1"
    id: Beschriftung_HK1
    address: 0x7360
    length: 42
    byte_offset: 2
    byte_length: 40
    disabled_by_default: true
    entity_category: diagnostic
    icon: "mdi:label"
    # `disabled_by_default` is an HA hint only -- the device polls regardless.
    # Without an explicit update_interval an entity has poll_interval 0, which
    # means "every hub tick": this read was going out every 60 s.
    update_interval: 24h

  # Most-recent SYSTEM fault (slot 1 of the 90-byte ecnsysEventType~Error
  # block; vcontrold getError0; code byte + 8-byte BCD timestamp).
  # HARDWARE-CONFIRMED at 0x7507 (2026-07-03 log: 0x38 Unterbrechung
  # Kesseltemperatursensor with valid timestamp). NOTE: the FehlerHisFA01..20
  # slots at 0x7590+ are a DIFFERENT archive -- the Feuerungsautomat (GFA
  # burner control unit) history with its own code space -- see the
  # "GFA Letzter Fehler" entity below. An earlier revision confused the two.
  # If the device NAKs the 9-byte block read, drop length to 1.
  # The codes map is the 'vd300' set (B3HA Serviceanleitung, 94 codes) and is
  # shared with the fault EVENT below via the YAML anchor.
  - platform: vitohome
    type: error_history
    name: "Letzter Fehler"
    id: letzter_fehler
    address: 0x7507
    length: 9
    icon: "mdi:alert-circle"
    entity_category: diagnostic
    update_interval: 300s
    codes: &vd300_codes
      0x00: "Regelbetrieb (kein Fehler)"
      0x10: "Kurzschluss Außentemperatursensor"
      0x18: "Unterbrechung Außentemperatursensor"
      0x19: "Unterbrechung Kommunikation Außentemperatursensor RF"
      0x1D: "Keine Kommunikation mit Sensor"
      0x1E: "Strömungssensor defekt"
      0x1F: "Strömungssensor defekt"
      0x20: "Kurzschluss Vorlauftemperatursensor Anlage"
      0x28: "Unterbrechung Vorlauftemperatursensor Anlage"
      0x30: "Kurzschluss Kesseltemperatursensor"
      0x38: "Unterbrechung Kesseltemperatursensor"
      0x40: "Kurzschluss Vorlauftemperatursensor Heizkreis 2 (mit Mischer)"
      0x44: "Kurzschluss Vorlauftemperatursensor Heizkreis 3 (mit Mischer)"
      0x48: "Unterbrechung Vorlauftemperatursensor Heizkreis 2 (mit Mischer)"
      0x49: "Codierung Erweiterung Mischer Heizkreis 2 falsch eingestellt"
      0x4C: "Unterbrechung Vorlauftemperatursensor Heizkreis 3 (mit Mischer)"
      0x4D: "Codierung Erweiterung Mischer Heizkreis 3 falsch eingestellt"
      0x50: "Kurzschluss Speichertemperatursensor"
      0x58: "Unterbrechung Speichertemperatursensor"
      0x90: "Kurzschluss Temperatursensor"
      0x91: "Kurzschluss Temperatursensor"
      0x92: "Kurzschluss Kollektortemperatursensor"
      0x93: "Kurzschluss Speichertemperatursensor"
      0x94: "Kurzschluss Speichertemperatursensor"
      0x98: "Unterbrechung Temperatursensor"
      0x99: "Unterbrechung Temperatursensor"
      0x9A: "Unterbrechung Kollektortemperatursensor"
      0x9B: "Unterbrechung Speichertemperatursensor"
      0x9C: "Unterbrechung Speichertemperatursensor"
      0x9E: "Zu geringer oder kein Volumenstrom im Solarkreis oder Temperaturwächter hat ausgelöst"
      0x9F: "Fehler Solarregelungsmodul oder Vitosolic"
      0xA2: "Anlagendruck zu niedrig"
      0xA3: "Abgastemperatursensor nicht richtig positioniert"
      0xA4: "Max. Anlagendruck überschritten"
      0xA7: "Bedienteil defekt"
      0xA8: "Luft in der internen Umwälzpumpe oder Mindest-Volumenstrom nicht erreicht"
      0xA9: "Interne Umwälzpumpe blockiert"
      0xB0: "Kurzschluss Abgastemperatursensor"
      0xB1: "Kommunikationsfehler Bedieneinheit"
      0xB5: "Interner Fehler"
      0xB7: "Fehler KesselCodierstecker"
      0xB8: "Unterbrechung Abgastemperatursensor"
      0xBA: "Kommunikationsfehler Erweiterungssatz für Heizkreis 2 (mit Mischer)"
      0xBB: "Kommunikationsfehler Erweiterungssatz für Heizkreis 3 (mit Mischer)"
      0xBC: "Kommunikationsfehler Fernbedienung Vitotrol Heizkreis 1 (ohne Mischer)"
      0xBD: "Kommunikationsfehler Fernbedienung Vitotrol Heizkreis 2 (mit Mischer)"
      0xBE: "Kommunikationsfehler Fernbedienung Vitotrol Heizkreis 3 (mit Mischer)"
      0xBF: "Falsches Kommunikationsmodul LON"
      0xC1: "Kommunikationsfehler Erweiterung EA1"
      0xC2: "Kommunikationsfehler Solarregelungsmodul oder Vitosolic"
      0xC3: "Kommunikationsfehler Erweiterung AM1"
      0xC4: "Kommunikationsfehler Erweiterung Open Therm"
      0xC5: "Kommunikationsfehler drehzahlgeregelte interne Pumpe"
      0xC6: "Kommunikationsfehler drehzahlgeregelte, externe Heizkreispumpe Heizkreis 2 (mit Mischer)"
      0xC7: "Kommunikationsfehler drehzahlgeregelte externe Heizkreispumpe Heizkreis 1 (ohne Mischer)"
      0xC8: "Kommunikationsfehler drehzahlgeregelte, externe Heizkreispumpe Heizkreis 3 (mit Mischer)"
      0xCD: "Kommunikationsfehler Vitocom 100 (KM-BUS)"
      0xCF: "Kommunikationsfehler Kommunikationsmodul LON"
      0xD6: "Eingang DE1 an Erweiterung EA1 meldet Störung"
      0xD7: "Eingang DE2 an Erweiterung EA1 meldet Störung"
      0xD8: "Störung Eingang DE3 an Erweiterung EA1"
      0xDA: "Kurzschluss Raumtemperatursensor Heizkreis 1 (ohne Mischer)"
      0xDB: "Kurzschluss Raumtemperatursensor Heizkreis 2 (mit Mischer)"
      0xDC: "Kurzschluss Raumtemperatursensor Heizkreis 3 (mit Mischer)"
      0xDD: "Unterbrechung Raumtemperatursensor Heizkreis 1 (ohne Mischer)"
      0xDE: "Unterbrechung Raumtemperatursensor Heizkreis 2 (mit Mischer)"
      0xDF: "Unterbrechung Raumtemperatursensor Heizkreis 3 (mit Mischer)"
      0xE0: "Fehler externer LON-Teilnehmer"
      0xE1: "Ionisationsstrom während der Kalibrierung zu hoch"
      0xE2: "Keine Kalibrierung wegen zu geringen Volumenstrom"
      0xE3: "Zu geringe Wärmeabnahme während der Kalibrierung Temperaturwächter hat ausgeschaltet."
      0xE4: "Fehler Versorgungsspannung 24 V"
      0xE5: "Fehler Flammenverstärker"
      0xE6: "Anlagendruck zu niedrig"
      0xE7: "Ionisationsstrom während der Kalibrierung zu gering"
      0xE8: "Ionisationsstrom nicht im gültigen Bereich"
      0xEA: "Ionisationsstrom während der Kalibrierung nicht im gültigen Bereich (zu große Abweichung gegenüber dem Vorgängerwert)"
      0xEB: "Wiederholter Flammenverlust während der Kalibrierung"
      0xEC: "Parameterfehler während der Kalibrierung"
      0xED: "Interner Fehler"
      0xEE: "Flammensignal ist bei Brennerstart nicht vorhanden oder zu gering."
      0xEF: "Flammenverlust direkt nach Flammenbildung (während der Sicherheitszeit)."
      0xF0: "Interner Fehler"
      0xF1: "Abgastemperaturbegrenzer hat ausgelöst."
      0xF2: "Temperaturbegrenzer hat ausgelöst."
      0xF3: "Flammensignal ist beim Brennerstart bereits vorhanden."
      0xF7: "Kurzschluss oder Unterbrechung Wasserdrucksensor"
      0xF8: "Brennstoffventil schließt verspätet."
      0xF9: "Gebläsedrehzahl beim Brennerstart zu niedrig"
      0xFA: "Gebläsestillstand nicht erreicht"
      0xFC: "Gaskombiregler defekt oder fehlerhafte Ansteuerung Modulationsventil oder Abgasweg versperrt"
      0xFD: "Kessel-Codierstecker fehlt / Fehler Feuerungsautomat"
      0xFE: "Kessel-Codierstecker oder Grundleiterplatte defekt oder falscher Kessel-Codierstecker"
      0xFF: "Interner Fehler oder Entriegelungstaste R blockiert"


  # No `codes:` map: the Feuerungsautomat archive has its own code space and
  # no published table for this variant, so a record renders as
  # "Fehler 0xNN @ <timestamp>". Do NOT paste the vd300 map in here -- the
  # codes would be wrong, not merely missing.
  - platform: vitohome
    type: error_history
    name: "GFA Letzter Fehler"
    id: gfa_letzter_fehler
    address: 0x7590
    length: 9
    icon: "mdi:alert-circle-outline"
    entity_category: diagnostic
    update_interval: 300s

  # Device identity (ASCII byte-strings, HexByte2AsciiByte) - read-only,
  # diagnostic. Surfaced by the vcontrold cross-check as worthwhile reads.
  # An entity with NO update_interval polls on EVERY hub tick (poll_interval
  # 0). These three plus Beschriftung HK1 are 79 bytes of immutable identity
  # that were going out every 60 s while the real sensors ran slower. Pin them.
  - platform: vitohome
    type: ascii
    name: "Sachnummer"
    id: Sachnummer
    address: 0x08E0
    length: 7
    entity_category: diagnostic
    icon: "mdi:identifier"
    update_interval: 24h
  - platform: vitohome
    type: ascii
    name: "HWHerstellNrRegelung"
    id: HWHerstellNrRegelung
    address: 0xF000
    length: 16
    entity_category: diagnostic
    icon: "mdi:identifier"
    update_interval: 24h
  - platform: vitohome
    type: ascii
    name: "HWHerstellNrKessel"
    id: HWHerstellNrKessel
    address: 0xF010
    length: 16
    entity_category: diagnostic
    icon: "mdi:identifier"
    update_interval: 24h

# Fires a Home Assistant logbook event when the newest-fault code CHANGES:
# hex type ("0x10") for a mapped code, "cleared" on transition to 0x00,
# "unknown" otherwise. First poll only records a baseline (no stale-fault
# spam at boot); read errors keep the baseline. Complements the polling
# "Letzter Fehler" text sensor above; same slot, same codes (anchor).
event:
  - platform: vitohome
    name: "Heizung Störung"
    id: fault_event
    address: 0x7507   # SYSTEM history slot 1 -- same slot as "Letzter Fehler"
    length: 9
    update_interval: 300s
    codes: *vd300_codes

# Force-refresh: marks every datapoint due on the next scheduler tick (the
# queue discipline throttles the burst; the hub debounces repeats within
# 5 s). Press from the HA UI, or call button.press from an automation --
# e.g. after changing coding values at the Bedienteil, so the 3600s-tier
# entities update immediately.
button:
  - platform: vitohome
    name: "Datenpunkte aktualisieren"
    id: refresh_all_button

  # --- Raw scan console: actions -------------------------------------------
  # An immediate one-off read -- it jumps the poll queue rather than waiting for
  # the next tick. The result (bytes + 64-bit integer views) appears on the
  # "Scan · Rohergebnis" text_sensor and in the log under the `vitohome` tag.
  # This is the tool for the CAPTURE questions in this file: point it at 0xA152
  # during a burn, or at 0x7362 with length 2 to find out whether that address
  # exists at all.
  - platform: template
    name: "Scan · Rohlesen (jetzt)"
    id: scan_read_now
    icon: "mdi:magnify"
    entity_category: config
    on_press:
      - lambda: |-
          const std::string &txt = id(scan_addr).state;
          if (txt.empty()) {
            ESP_LOGW("scan", "address is empty");
            return;
          }
          // strtol returns 0 for junk, and 0x0000 is a VALID Optolink address --
          // so check that the whole string was consumed instead of testing the
          // result against 0.
          char *end = nullptr;
          long a = strtol(txt.c_str(), &end, 16);
          if (end == txt.c_str() || *end != '\0' || a < 0 || a > 0xFFFF) {
            ESP_LOGW("scan", "address must be 1-4 hex digits, got '%s'", txt.c_str());
            return;
          }
          // The template number publishes its initial_value at setup, but guard
          // anyway: ESPHome's Number declares a bare `float state;` with no
          // initialiser, so before the first publish it reads 0.0 -- and the hub
          // rejects length 0. has_state(), not isnan().
          if (!id(scan_length).has_state()) {
            ESP_LOGW("scan", "read length not set yet");
            return;
          }
          id(vito).queue_raw_read((uint16_t) a, (uint8_t) id(scan_length).state);

  # --- DANGER ---------------------------------------------------------------
  # Writes arbitrary bytes to an arbitrary address. There is no allow-list, no
  # range check against the datapoint's borders, and no undo. Coding addresses
  # (0x2000-0x27FF, 0x6300+, ...) configure the appliance; a wrong byte can put
  # the boiler into a state the Bedienteil will not show you. Some addresses are
  # write-once or ACK a value they then ignore.
  #
  # It is `disabled_by_default` on purpose. Enable it in Home Assistant only for
  # as long as you need it, and read the address back first with the read button
  # so you know what to restore. The hub caps the payload at 32 bytes.
  - platform: template
    name: "Scan · Rohschreiben"
    id: scan_write_now
    icon: "mdi:alert-octagon"
    entity_category: config
    disabled_by_default: true
    on_press:
      - lambda: |-
          const std::string &txt = id(scan_addr).state;
          char *end = nullptr;
          long a = strtol(txt.c_str(), &end, 16);
          if (txt.empty() || end == txt.c_str() || *end != '\0' || a < 0 || a > 0xFFFF) {
            ESP_LOGW("scan", "address must be 1-4 hex digits, got '%s'", txt.c_str());
            return;
          }
          auto ishex = [](char c) {
            return (c >= '0' && c <= '9') || (c >= 'a' && c <= 'f') || (c >= 'A' && c <= 'F');
          };
          std::string hex;
          for (char ch : id(scan_write_bytes).state) {
            if (ishex(ch)) hex.push_back(ch);
          }
          if (hex.empty() || (hex.size() % 2) != 0) {
            ESP_LOGW("scan", "write bytes: need an even number of hex digits, got '%s'",
                     id(scan_write_bytes).state.c_str());
            return;
          }
          std::vector<uint8_t> bytes;
          for (size_t i = 0; i + 1 < hex.size(); i += 2) {
            bytes.push_back((uint8_t) strtol(hex.substr(i, 2).c_str(), nullptr, 16));
          }
          ESP_LOGW("scan", "RAW WRITE 0x%04X (%u bytes)", (unsigned) (uint16_t) a,
                   (unsigned) bytes.size());
          id(vito).queue_raw_write((uint16_t) a, bytes);

number:
  # --- Raw scan console: read length ---------------------------------------
  # 1..48 is the hub's own cap (RAW_READ_MAX; queue_raw_read rejects anything
  # outside it and logs a warning). 48 covers every block the catalogs emit,
  # including the 42-byte Beschriftung_* label blocks -- so the console can test
  # a read before you enable the entity that performs it. Raw WRITES are still
  # capped at 32 bytes (they carry an inline payload).
  - platform: template
    id: scan_length
    name: "Scan · Leselänge (Bytes)"
    optimistic: true
    min_value: 1
    max_value: 48
    step: 1
    initial_value: 2
    mode: box
    icon: "mdi:ruler"
    entity_category: config

  # DHW target temperature (also driven by the water_heater card below).
  # This is the STORED setpoint (Bedien_WW_Solltemperatur) and is writable even
  # on a unit with no cylinder: hardware-confirmed 2026-07-09, 50 -> 49 -> 48,
  # each write ACKed and read back. It is a different register from 0x6500
  # (the effective setpoint) -- 0x6500 did not follow this write.
  - platform: vitohome
    name: "Bedien WW Solltemperatur"
    id: Bedien_WW_Solltemperatur
    address: 0x6300            # Bedien WW Solltemperatur (writable)
    length: 1
    converter: noconv
    unit_of_measurement: "°C"
    device_class: temperature
    min_value: 10
    max_value: 95              # Vitosoft border; coding addresses may clamp lower
    step: 1
    mode: box
    update_interval: 3600s

  # Reduced-mode room setpoint. (The NORMAL room setpoint 0x2306 is owned by
  # the climate entity below - do not add a second writer for it.)
  - platform: vitohome
    name: "Raumsoll Reduziert"
    id: BedienRTSolltemperaturReduziertA1M1
    address: 0x2307
    length: 1
    converter: noconv
    unit_of_measurement: "°C"
    device_class: temperature
    min_value: 3
    max_value: 37
    step: 1
    mode: box
    update_interval: 3600s

  # Heating curve: slope (Neigung, div10) and level (Niveau, signed Kelvin
  # offset) - the two knobs of weather-compensated control.
  - platform: vitohome
    name: "Heizkurve Neigung"
    id: KD3_KonfiNeigungA1D
    address: 0x27D3
    length: 1
    converter: div10
    min_value: 0.2
    max_value: 3.5
    step: 0.1
    mode: box
    update_interval: 3600s
  - platform: vitohome
    name: "Heizkurve Niveau"
    id: KD4_KonfiNiveauA1
    address: 0x27D4
    length: 1
    converter: noconv
    signed: true
    unit_of_measurement: "K"
    min_value: -13
    max_value: 40
    step: 1
    mode: box
    update_interval: 3600s

select:
  # Operating-mode dropdown (Betriebsart) on the COMMAND register 0x2323.
  #
  # SINGLE-WRITER DISCIPLINE. 0x2323 is one mutually exclusive 5-value program
  # and the climate entity below already writes it through its presets. Two
  # writers on one register means two HA entities silently changing each other,
  # so this select is `internal: true`: it is registered, it polls, it logs the
  # raw byte and its label -- and it never appears in Home Assistant, so it can
  # never write. It is the read-side probe for 0x2323 (the climate reads the
  # DIFFERENT register 0x2301) and the mode source for the water_heater below.
  #
  # Prefer a dropdown to climate presets? Flip `internal: false` here and DELETE
  # the `operating_mode:` block from the climate entity. Do not keep both.
  #
  # 0x2323 (BedienteilBA_GWGA1, 5 values) is a DIFFERENT enum from 0x2301
  # (BedienBetriebsart, 6 values, the one openv/vcontrold drive); the controller
  # translates one to the other. See the climate entity below for the observed
  # map and which pairs are confirmed against a log in hand.
  - platform: vitohome
    name: "Modus Betriebsart"
    id: BedienteilBA_GWGA1
    address: 0x2323
    length: 1
    internal: true
    update_interval: 60s
    options:
      0x00: "Abschaltbetrieb"
      0x01: "Nur Warmwasser"
      0x02: "Heizen und Warmwasser"
      0x03: "Reduziert"
      0x04: "Normal"

switch:
  # Party and economy as native HA toggles. Both have the read/write address
  # split: the switch WRITES the command address and READS the live state
  # address, with the default 1/0 on/off pair. Confirm on hardware that
  # toggling actually moves the state.
  # 60s, not 30s: the hub tick is 60s and a shorter per-entity interval simply
  # degrades to it (the hub logs a warning at setup). State the truth.
  - platform: vitohome
    name: "Partybetrieb"
    id: NRx_PartybetriebA1M1_D
    address: 0x2330            # command (NRx Partybetrieb)
    state_address: 0x2303      # live state (BedienPartybetrieb)
    icon: "mdi:party-popper"
    update_interval: 60s
  - platform: vitohome
    name: "Sparbetrieb"
    id: NRx_SparbetriebA1M1_D
    address: 0x2331            # command (NRx Sparbetrieb)
    state_address: 0x2302      # live state (BedienSparbetrieb)
    icon: "mdi:leaf"
    update_interval: 60s

climate:
  # Room climate for heating circuit 1: the slider edits the room setpoint
  # (0x2306, applied through the heat curve); Betriebsart rides along as
  # presets. This entity is the SINGLE WRITER of 0x2323 (see the select above).
  #
  # The read/write split is the point of this example: `write` is the command
  # byte (0x2323, BedienteilBA_GWGA1) and `read` is the state byte (0x2301,
  # BedienBetriebsart) -- two different enums, which is why a plain select
  # cannot represent Betriebsart faithfully.
  #
  # 0x2323 -> 0x2301 translation. Vitosoft value labels (from DPDefinitions):
  #   0x2323 BedienteilBA_GWGA1: 0 Abschalt / 1 Nur WW / 2 Heizen + WW /
  #                              3 Dauernd Reduziert / 4 Dauernd Normal
  #   0x2301 BedienBetriebsart:  0 Sommerbetrieb / 1 DAUERND_REDUZIERT /
  #                              2 DAUERND_NORMAL / 3 NORMAL_REDUZIERT /
  #                              4 NORMAL_ABSCHALT / 5 DAUERND_ABSCHALT
  # ALL FIVE PAIRS HARDWARE-CONFIRMED (2026-07-10 P300 log; the select's raw
  # read and the climate's state read land in the same poll burst):
  #   0x00 -> 0x05   Abschalt          -> DAUERND_ABSCHALT
  #   0x01 -> 0x00   Nur WW            -> Sommerbetrieb
  #   0x02 -> 0x03   Heizen + WW       -> NORMAL_REDUZIERT
  #   0x03 -> 0x01   Dauernd Reduziert -> DAUERND_REDUZIERT
  #   0x04 -> 0x02   Dauernd Normal    -> DAUERND_NORMAL
  #
  # GAP: 0x2301 also has the value 0x04 (NORMAL_ABSCHALT), which no preset
  # claims. If the panel or a schedule ever selects it, no preset matches and
  # the card shows the last known preset. There is no 0x2323 command that
  # produces it, so it cannot be reached from Home Assistant.
  #
  # DHW: presets "Normal" (0x04) and "Reduziert" (0x03) are HEATING-ONLY
  # programs. Selecting them disables domestic hot water at the boiler --
  # not a bug in this config, but the appliance's one-program-register design.
  # Only "Heizen und Warmwasser" (0x02) and "Nur Warmwasser" (0x01) enable DHW.
  #
  # `current_temperature` has no source and publishes 0.00 degC. The candidate
  # is HK_RaumsolltemperaturaktuellA1M1 (0x2500 bytes 12..13) -- exposed as a
  # CAPTURE sensor above.
  - platform: vitohome
    name: "Heizkreis 1"
    id: hk1_climate
    target_address: 0x2306
    visual:
      min_temperature: 3
      max_temperature: 37
      temperature_step: 1
    operating_mode:
      address: 0x2323          # write (command, BedienteilBA_GWGA1)
      state_address: 0x2301    # read (BedienBetriebsart, operator-set mode)
      presets:
        - {name: "Normal", write: 0x04, read: [0x02], mode: heat}
        - {name: "Reduziert", write: 0x03, read: [0x01], mode: heat}
        - {name: "Heizen und Warmwasser", write: 0x02, read: [0x03], mode: heat}
        - {name: "Nur Warmwasser", write: 0x01, read: [0x00], mode: "off"}
        - {name: "Abschaltbetrieb", write: 0x00, read: [0x05], mode: "off"}

# Per-day switching-time program for heating circuit 1 as editable text
# ("06:00-22:00 08:30-12:00", up to four ON-OFF pairs, "--" disabled, device
# stores on a 10-minute grid). Addresses follow the vcontrold convention
# (base + day*8, Monday first) - HARDWARE-CONFIRMED on this unit
# (2026-07-03 log: all seven days decode "04:30-22:30"). Other programs
# stride the same way from their own bases: DHW 0x2100, circulation 0x2200
# (vcontrold convention, those bases not yet read on this unit).
text:
  # --- Raw scan console: inputs --------------------------------------------
  # Hex, without the 0x. 0x0000 is a valid Optolink address, so an empty string
  # is rejected rather than treated as "no address" (see the read button).
  - platform: template
    id: scan_addr
    name: "Scan · Adresse (hex, z.B. 0800)"
    optimistic: true
    mode: text
    initial_value: "0800"
    icon: "mdi:map-marker"
    entity_category: config

  # Bytes to write, hex, in WIRE ORDER (little-endian for multi-byte integers).
  # Separators are ignored: "00 0A", "00:0A" and "000A" are the same two bytes.
  - platform: template
    id: scan_write_bytes
    name: "Scan · Schreib-Bytes (hex, z.B. 30 oder 00 0A)"
    optimistic: true
    mode: text
    initial_value: ""
    icon: "mdi:pencil"
    entity_category: config

  - platform: vitohome
    name: "HK1 Schaltzeit Montag"
    id: hk1_schaltzeit_mo
    address: 0x2000
    update_interval: 1h
  - platform: vitohome
    name: "HK1 Schaltzeit Dienstag"
    id: hk1_schaltzeit_di
    address: 0x2008
    update_interval: 1h
  - platform: vitohome
    name: "HK1 Schaltzeit Mittwoch"
    id: hk1_schaltzeit_mi
    address: 0x2010
    update_interval: 1h
  - platform: vitohome
    name: "HK1 Schaltzeit Donnerstag"
    id: hk1_schaltzeit_do
    address: 0x2018
    update_interval: 1h
  - platform: vitohome
    name: "HK1 Schaltzeit Freitag"
    id: hk1_schaltzeit_fr
    address: 0x2020
    update_interval: 1h
  - platform: vitohome
    name: "HK1 Schaltzeit Samstag"
    id: hk1_schaltzeit_sa
    address: 0x2028
    update_interval: 1h
  - platform: vitohome
    name: "HK1 Schaltzeit Sonntag"
    id: hk1_schaltzeit_so
    address: 0x2030
    update_interval: 1h

# DHW as a native HA water-heater card, wrapping the entities above.
# Boot note: until the first sensor/number reads land (~5 s), the lambdas
# return NAN and the template platform re-publishes every loop (NAN != NAN
# in its change check) -- brief log chatter, settles by itself; the template
# lambda type is a plain float, so it cannot return "no update".
# current temperature from the tank sensor, target from the writable
# setpoint number (whose read-back keeps the card honest after the
# controller clamps a write). DHW on/off stays with Betriebsart by design.
# A native Home Assistant water_heater card in front of the two DHW
# datapoints. Inert on the reference unit (no cylinder: current_temperature is
# a frozen 20.0 degC and nothing consumes the setpoint), kept deliberately --
# it is the platform coverage, and it is what a tank-equipped user starts from.
#
# `optimistic: true` IS LOAD-BEARING, not a style choice. Read
# template_water_heater.cpp (ESPHome 2026.6.x): control() stores the commanded
# target only `if (this->optimistic_)`, and `set_trigger_` is a `Trigger<>`
# with no arguments -- the call object never reaches the automation. With
# `optimistic: false` the `set_action` below therefore read the PREVIOUS
# target, the guard `!= number.state` was always false, and dragging the
# card's temperature slider silently did nothing. (The 50->49->48 writes in the
# 2026-07-09 log came from the `number` entity, not from this card.)
# The optimistic value is corrected on the next loop() by `target_temperature:`
# below, which republishes whatever the device actually confirmed.
#
# The lambdas return `optional<float>`, so `return {};` means "no update".
# That is how the NaN before the first successful poll is suppressed instead of
# being published as 0.00 degC.
#
# NO `supported_modes:` -- deliberately. TemplateWaterHeater::traits() only
# advertises WATER_HEATER_SUPPORTS_OPERATION_MODE when supported_modes is
# non-empty, so this card shows temperature only. DHW on/off lives in
# Betriebsart (0x2323), whose single writer is the climate entity; a mode
# dropdown here would be a second writer, or a control that snaps back. The
# `mode:` lambda below is read-only: it makes the card's state honest without
# taking the register.
water_heater:
  - platform: template
    name: "Warmwasser"
    id: dhw
    optimistic: true
    # `visual:` IS LOAD-BEARING. WaterHeaterTraits defaults min/max temperature
    # to 0.0f, TemplateWaterHeater::traits() never sets them, and
    # WaterHeaterCall::validate_() clamps every requested target into
    # [min, max]. Omit this block and EVERY set from the Home Assistant card
    # arrives as 0.00 degC -- hardware-confirmed 2026-07-10:
    #   [W][number]: 'Bedien WW Solltemperatur': 0.000000 < min 10.000000
    # (The number's own min_value caught it, so nothing reached the boiler.)
    # Mirror the borders of the underlying datapoint 0x6300 (Vitosoft: 10..95).
    visual:
      min_temperature: 10
      max_temperature: 95
      target_temperature_step: 1
    # `has_state()`, NOT `isnan()`. esphome::number::Number declares a bare
    # `float state;` with no initialiser -- it reads 0.0, not NAN, until the
    # first successful poll. An isnan() guard therefore lets a spurious
    # 0.00 degC target through at boot (hardware-confirmed: the first publish
    # at 06:00:44 showed `Target Temperature: 0.00°C`, three seconds before the
    # first read of 0x6300 returned 48). Same for esphome::sensor::Sensor.
    current_temperature: |-
      if (!id(TiefpassTemperaturwertWW1).has_state()) return {};
      return id(TiefpassTemperaturwertWW1).state;
    target_temperature: |-
      if (!id(Bedien_WW_Solltemperatur).has_state()) return {};
      return id(Bedien_WW_Solltemperatur).state;
    # Read-only mode, derived from the Betriebsart command register 0x2323 via
    # the internal select. Its options are declared in raw order 0x00..0x04, so
    # active_index() == the wire value. 1 = Nur Warmwasser, 2 = Heizen und
    # Warmwasser: the only two programs in which the boiler makes hot water.
    mode: |-
      const auto idx = id(BedienteilBA_GWGA1).active_index();
      if (!idx.has_value()) return {};
      if (*idx == 1 || *idx == 2) return water_heater::WATER_HEATER_MODE_ECO;
      return water_heater::WATER_HEATER_MODE_OFF;
    # Belt and braces: `visual:` above makes validate_() clamp into a sane
    # range, but a config that forgets it would otherwise queue a 0 degC write
    # on any device whose number allows 0. Range-check here too.
    set_action:
      - if:
          condition:
            lambda: |-
              const float t = id(dhw).get_target_temperature();
              if (std::isnan(t) || t < 10.0f || t > 95.0f) return false;
              return !id(Bedien_WW_Solltemperatur).has_state() || t != id(Bedien_WW_Solltemperatur).state;
          then:
            - number.set:
                id: Bedien_WW_Solltemperatur
                value: !lambda "return id(dhw).get_target_temperature();"
