# Copy to secrets.yaml (same dir as the config) and fill in real values.
# This config uses Ethernet (DM9051), so no Wi-Fi secrets are needed —
# only the API encryption key and the OTA password.

# 32-byte base64 Noise key. The placeholder below is base64 of 32 ZERO bytes:
# it is syntactically valid so `esphome config` passes against an unedited
# copy, but it is PUBLIC and provides no security — generate your own before
# flashing anything reachable from a real network:
#   python3 -c "import secrets,base64; print(base64.b64encode(secrets.token_bytes(32)).decode())"
esphome-api: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="

# Strong OTA password (free-form string; the placeholder is NOT strong).
esphome-ota: "REPLACE_WITH_A_STRONG_OTA_PASSWORD"
