# Copy to secrets.yaml (same dir as hardware-test.yaml) and fill in.
# secrets.yaml is gitignored — never commit real keys.
#
# Generate api_key:  `openssl rand -base64 32`
# ota_password can be any string you'll remember.

wifi_ssid: "YOUR_WIFI_SSID"
wifi_password: "YOUR_WIFI_PASSWORD"
api_key: "GENERATE_A_32_BYTE_BASE64_KEY"
ota_password: "CHOOSE_AN_OTA_PASSWORD"
