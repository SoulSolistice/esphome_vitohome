# Shared test config: exercises EVERY vitohome platform and option so the CI
# `esphome compile` covers all codegen paths under both frameworks. The
# per-framework wrappers (test.esp32-arduino.yaml / test.esp32-idf.yaml) set
# substitutions + the esp32 block, then `<<: !include` this file.
#
# No network stack here on purpose: a compile test does not need wifi/api/ota,
# and leaving them out keeps the build fast and dependency-light.

esphome:
  name: ${name}

external_components:
  - source:
      type: local
      path: ../components
    components: [vitohome]

logger:
  level: DEBUG

uart:
  - id: uart_optolink
    rx_pin: GPIO16
    tx_pin: GPIO17
    baud_rate: 4800
    data_bits: 8
    parity: EVEN
    stop_bits: 2

vitohome:
  id: vito
  uart_id: uart_optolink
  protocol: ${protocol}
  update_interval: 60s
  identify_device: ${identify_device}
  # Compile-time Optolink frame logging. The wrappers set this both ways so
  # CI compiles the -DVITOHOME_LOG_FRAMES branch of vito_uart_interface.h and
  # the branch without it.
  log_frames: ${log_frames}

sensor:
  # div10 SIGNED via converter default
  - platform: vitohome
    name: "Test Temp Div10"
    address: 0x0800
    length: 2
    converter: div10
    unit_of_measurement: "C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
  # sec2hour counter (read-only, double-precision decode) + per-entity interval
  - platform: vitohome
    name: "Test Hours"
    address: 0x08A7
    length: 4
    converter: sec2hour
    unit_of_measurement: "h"
    state_class: total_increasing
    accuracy_decimals: 1
    update_interval: 600s
  # noconv with byte_offset (extract byte 1 of a 2-byte read)
  - platform: vitohome
    name: "Test Pump Speed"
    address: 0x7660
    length: 2
    converter: noconv
    byte_offset: 1
    unit_of_measurement: "%"
    accuracy_decimals: 0
    state_class: measurement
  # div1000
  - platform: vitohome
    name: "Test Consumption"
    address: 0x7574
    length: 4
    converter: div1000
    unit_of_measurement: "l"
    state_class: total_increasing
    accuracy_decimals: 1
  # explicit signed override on a noconv sensor
  - platform: vitohome
    name: "Test Signed Offset"
    address: 0x3000
    length: 1
    converter: noconv
    signed: true
    state_class: measurement

binary_sensor:
  # hub-fed Optolink link diagnostic (no address, never polls)
  - platform: vitohome
    type: connectivity
    name: "Test Optolink Link"
  # default bit_mask (0xFF: any nonzero byte is active)
  - platform: vitohome
    name: "Test Problem"
    address: 0x0A82
    length: 1
    device_class: problem
  # explicit byte_offset + bit_mask
  - platform: vitohome
    name: "Test Bit"
    address: 0x0A10
    length: 2
    byte_offset: 1
    bit_mask: 0x04
    device_class: running
    update_interval: 120s
  # block-interior bit: read the 22-byte block at its base (aligned; P300 NAKs
  # an interior read) and index byte 16 inside the payload. Vitosoft numbers
  # bits MSB-first, so bit 135 (= byte 16, in-byte index 7) is mask 0x01.
  - platform: vitohome
    name: "Test Block Bit"
    address: 0x2500
    length: 22
    byte_offset: 16
    bit_mask: 0x01
    device_class: cold
    update_interval: 300s

number:
  # noconv unsigned, mode box, read_back default (true)
  - platform: vitohome
    name: "Test Setpoint"
    address: 0x6300
    length: 1
    converter: noconv
    min_value: 10
    max_value: 60
    step: 1
    unit_of_measurement: "C"
    mode: box
    update_interval: 3600s
  # interior numeric field (the pump-speed shape): aligned block read at the
  # base (state_address + byte_offset), write to the field's own register
  - platform: vitohome
    name: "Test Interior Number"
    address: 0x7952
    state_address: 0x7951
    length: 2
    byte_offset: 1
    converter: noconv
    min_value: 0
    max_value: 100
    step: 1
    mode: box
  # div10 (signed by converter), natural units
  - platform: vitohome
    name: "Test Slope"
    address: 0x27D3
    length: 1
    converter: div10
    min_value: 0.2
    max_value: 3.5
    step: 0.1
    mode: slider
  # noconv signed override, optimistic (read_back false)
  - platform: vitohome
    name: "Test Niveau"
    address: 0x27D4
    length: 1
    converter: noconv
    signed: true
    min_value: -13
    max_value: 40
    step: 1
    read_back: false

select:
  - platform: vitohome
    name: "Test Mode"
    address: 0x2301
    length: 1
    icon: "mdi:radiator"
    options:
      0x00: "Standby"
      0x01: "Reduced"
      0x02: "Normal"
      0x03: "Heating + DHW"
  # interior enum field: aligned block read at the base (state_address +
  # byte_offset), write to the field's own register
  - platform: vitohome
    name: "Test Interior Select"
    address: 0x7661
    state_address: 0x7660
    length: 2
    byte_offset: 1
    options:
      0x00: "Aus"
      0x02: "Heizen"

switch:
  # write/state address split (command 0x2330, live state 0x2303) with the
  # default 1/0 on/off pair
  - platform: vitohome
    name: "Test Party Mode"
    address: 0x2330
    state_address: 0x2303
    update_interval: 300s
  # non-default wire values (K8A-style: 0xAF = on, 0xB0 = off)
  - platform: vitohome
    name: "Test Coding Toggle"
    address: 0x778A
    on_value: 0xAF
    off_value: 0xB0
    entity_category: config
  # interior boolean field: same block-extract form as the select above
  - platform: vitohome
    name: "Test Interior Switch"
    address: 0x7662
    state_address: 0x7660
    length: 4
    byte_offset: 2

event:
  # fault-code slot FA01: fires on code change (hex type / cleared / unknown)
  - platform: vitohome
    name: "Test Fault Event"
    address: 0x7507
    update_interval: 300s
    codes:
      0x10: "Kurzschluss Aussentemperatursensor"
      0xF9: "Fehler Geblaese"

text_sensor:
  # device identity (hub-fed, no address)
  - platform: vitohome
    type: device_id
    name: "Test Device Id"
    entity_category: diagnostic
  # raw hex dump
  - platform: vitohome
    type: raw
    name: "Test Raw"
    address: 0x00F8
    length: 4
  # utf16 read AT the P300 single-telegram limit. Anything wider (e.g. the
  # 40-byte label block at 0x7362) is answered with an error telegram on P300;
  # the hub's FINAL_VALIDATE_SCHEMA now rejects that at config time when
  # `protocol: P300`, so this file caps at 36 to validate under every wrapper.
  - platform: vitohome
    type: utf16
    name: "Test Label"
    address: 0x7362
    length: 36
    update_interval: 24h
  # enum text sensor
  - platform: vitohome
    type: enum
    name: "Test Enum"
    address: 0x0A20
    length: 1
    options:
      0x00: "Off"
      0x01: "On"
  # interior enum field: aligned block read at the base, decode the byte at
  # byte_offset (read-only, so the base is simply the address)
  - platform: vitohome
    type: enum
    name: "Test Interior Enum"
    address: 0x2500
    length: 22
    byte_offset: 1
    options:
      0x00: "Aus"
      0x02: "Heizen"
  # error history (9-byte block, full timestamp) with a small code map
  - platform: vitohome
    type: error_history
    name: "Test Error"
    address: 0x7507
    length: 9
    update_interval: 300s
    codes:
      0x00: "No error"
      0x0F: "EMV / internal error"
  # scan-console result surface (hub-fed, no address) — exercises the raw lane
  - platform: vitohome
    type: scan_result
    name: "Test Scan Result"
    entity_category: diagnostic

# Per-day Schaltzeiten (switching-time) editing. Exercises the text platform so
# the CI compile builds vito_text.cpp (and loads the text base component). The
# addresses are arbitrary for a compile test.
text:
  - platform: vitohome
    name: "Test Schaltzeit Mo"
    address: 0x2000
    update_interval: 3600s
  - platform: vitohome
    name: "Test Schaltzeit Di"
    address: 0x2008

# Weather-compensated heating-circuit proxy: slider writes the room setpoint,
# Betriebsart is exposed as custom presets with a derived mode. Exercises the
# climate platform so the CI compile builds vito_climate.cpp (and loads the
# climate base). Addresses/bytes are arbitrary for a compile test.
climate:
  - platform: vitohome
    name: "Test Heating Circuit"
    target_address: 0x2306
    visual:
      min_temperature: 3
      max_temperature: 37
      temperature_step: 1
    operating_mode:
      address: 0x2323         # write (command)
      state_address: 0x2301   # read (actual mode)
      presets:
        - {name: "Normal", write: 0x04, read: [0x02], mode: heat}
        - {name: "Reduziert", write: 0x03, read: [0x01], mode: heat}
        - {name: "Nur Warmwasser", write: 0x01, read: [0x00], mode: "off"}
        - {name: "Abschaltbetrieb", write: 0x00, read: [0x05], mode: "off"}

# Exercise the raw-lane public API (queue_raw_read / queue_raw_write) so the CI
# compile builds it; the bytes/addresses are arbitrary, this never runs on real
# hardware in CI.
button:
  # force-refresh: marks all datapoints due (hub-debounced)
  - platform: vitohome
    name: "Test Refresh"
  - platform: template
    name: "Test Raw Read"
    entity_category: diagnostic
    on_press:
      - lambda: |-
          id(vito).queue_raw_read(0x0800, 2);
  - platform: template
    name: "Test Raw Write"
    entity_category: diagnostic
    on_press:
      - lambda: |-
          std::vector<uint8_t> b{0x01};
          id(vito).queue_raw_write(0x2301, b);
