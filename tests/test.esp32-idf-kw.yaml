# KW (VS1) protocol on esp-idf. Build-time selectable through ProtocolAdapter.
# Compile gate for the OptolinkEngine<KW>/VS1Engine instantiation and the KW
# branch of ProtocolAdapter through the real ESPHome+PlatformIO build.
# Force identify_device off to exercise the disabled path in CI. NOTE: the
# DEFAULT for KW is now ON (identification is hardware-confirmed on KW); this
# "false" is a test override, not the default.
substitutions:
  name: vitohome-test-idf-kw
  protocol: KW
  log_frames: "true"
  identify_device: "false"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

<<: !include common.yaml
