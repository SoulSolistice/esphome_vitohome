# GWG protocol on esp-idf. GWG is build-time selectable through ProtocolAdapter
# but UNTESTED on hardware -- this job is a compile gate (codegen + the
# OptolinkEngine<GWG>/GWGEngine instantiation + the GWG branch of
# ProtocolAdapter through the real ESPHome+PlatformIO build), not a wire test.
# identify_device is set false (the natural default for GWG): the 0xF8..0xFB
# identification is a P300-era scheme.
#
# Uses common-gwg.yaml, not common.yaml: GWG addresses a single byte, so the
# 16-bit addresses in common.yaml would be silently truncated. See that file.
substitutions:
  name: vitohome-test-idf-gwg
  protocol: GWG
  log_frames: "false"
  identify_device: "false"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

<<: !include common-gwg.yaml
